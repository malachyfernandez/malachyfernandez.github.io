<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blend In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --danger: #cf6679;
            --text: #ffffff;
            --text-sec: #b3b3b3;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }
        #app {
            width: 100%;
            max-width: 600px;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 10px;
        }
        #top-half {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        #bottom-half {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10px;
        }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 0; }
        #bottom-half .screen { width: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.3s; }
        
        /* 16 Words Grid */
        #reference-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            flex: 1;
            min-height: 0;
        }
        .grid-item {
            background-color: var(--surface);
            border-radius: 10px;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            font-weight: 600;
            border: 1px solid #333;
            word-wrap: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            line-height: 1.1;
        }
        
        /* Controls */
        input[type="number"] {
            font-size: 2rem;
            width: 100px;
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--primary);
            border-radius: 8px;
        }
        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
        }
        .title {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            margin: 5px 0;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), #03dac6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .category-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }
        .category-badge {
            background-color: #333;
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            min-width: 200px;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }
        .refresh-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 1.1rem;
            border-radius: 20px;
            margin: 0;
            background-color: #333;
            border: 1px solid var(--primary);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn:hover {
            background: rgba(209, 172, 255, 0.3);
            color: #000;
        }
        .role-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 15px 0;
            border: 1px solid #333;
            width: 100%;
            max-width: 340px;
        }
        .role-label {
            font-size: 0.9rem;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .imposter-text { color: var(--danger); font-size: clamp(2rem, 7vw, 3rem); font-weight: 800; margin: 0; }
        .word-text { color: var(--primary); font-size: clamp(2rem, 7vw, 3rem); font-weight: 800; margin: 0; }
        .hint-text { color: var(--text-sec); font-size: 1rem; margin-top: 10px; }
        #secret-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="top-half">
        <div id="reference-grid"></div>
    </div>

    <div id="bottom-half">
        <div id="setup-screen" class="screen active">
            <h1 class="title">Blend In</h1>
            <div class="category-row">
                <div id="category-title" class="category-badge">Loading Category...</div>
                <button class="refresh-btn" onclick="refreshCategory()" title="New Category">
                    <svg width="20" height="16" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5372 8.68694C15.6405 8.2858 15.399 7.87692 14.9979 7.77367C14.5967 7.67043 14.1878 7.91192 14.0846 8.31306L15.5372 8.68694ZM14.8109 5.5L14.5014 6.18316C14.8556 6.34362 15.2737 6.20679 15.4644 5.86796L14.8109 5.5ZM2.46264 5.31306C2.35939 5.7142 2.60088 6.12308 3.00202 6.22633C3.40316 6.32958 3.81205 6.08808 3.91529 5.68695L2.46264 5.31306ZM3.18896 8.5L3.49846 7.81683C3.14427 7.65637 2.72618 7.79322 2.53542 8.13206L3.18896 8.5ZM17.1535 2.86796C17.3568 2.50702 17.2289 2.04968 16.868 1.84647C16.507 1.64325 16.0497 1.7711 15.8465 2.13204L17.1535 2.86796ZM11.8095 3.31684C11.4322 3.14591 10.9878 3.3132 10.8168 3.6905C10.6459 4.06779 10.8132 4.51223 11.1905 4.68316L11.8095 3.31684ZM0.846455 11.1321C0.643248 11.493 0.771119 11.9503 1.13206 12.1535C1.493 12.3568 1.95034 12.2289 2.15355 11.8679L0.846455 11.1321ZM6.19051 10.6832C6.56781 10.8541 7.01224 10.6868 7.18316 10.3095C7.35409 9.93219 7.1868 9.48776 6.80949 9.31684L6.19051 10.6832ZM14.0846 8.31306C13.5017 10.5776 11.4452 12.25 8.99994 12.25V13.75C12.1462 13.75 14.788 11.5981 15.5372 8.68694L14.0846 8.31306ZM8.99994 1.75C11.4452 1.75 13.5017 3.42242 14.0846 5.68695L15.5372 5.31306C14.788 2.4019 12.1462 0.25 8.99994 0.25V1.75ZM3.91529 5.68695C4.49814 3.42242 6.55468 1.75 8.99994 1.75V0.25C5.85368 0.25 3.21192 2.4019 2.46264 5.31306L3.91529 5.68695ZM8.99994 12.25C6.55468 12.25 4.49814 10.5776 3.91529 8.31305L2.46264 8.68694C3.21192 11.5981 5.85368 13.75 8.99994 13.75V12.25ZM15.4644 5.86796L17.1535 2.86796L15.8465 2.13204L14.1574 5.13204L15.4644 5.86796ZM15.1204 4.81684L11.8095 3.31684L11.1905 4.68316L14.5014 6.18316L15.1204 4.81684ZM2.53542 8.13206L0.846455 11.1321L2.15355 11.8679L3.84251 8.86794L2.53542 8.13206ZM2.87947 9.18316L6.19051 10.6832L6.80949 9.31684L3.49846 7.81683L2.87947 9.18316Z" fill="var(--primary)"/>
                    </svg>
                </button>
            </div>
            <p>How many players?</p>
            <input type="number" id="player-count" value="4" min="3" max="20">
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="pass-screen" class="screen">
            <div style="font-size: 3.5rem; margin-top: 20px;">�</div>
            <h2 id="pass-title">Player 1</h2>
            <p style="color: var(--text-sec); font-size: 0.95rem;">Pass the phone. Keep it hidden!</p>
            <button onclick="reveal()">Reveal Role</button>
        </div>

        <div id="reveal-screen" class="screen">
            <div id="secret-display"></div>
            <button id="next-btn" onclick="nextPlayer()"></button>
        </div>
        
        <div id="end-screen" class="screen">
            <div style="font-size: 3rem;">🕵️</div>
            <h2>Let the game begin!</h2>
            <p style="color: var(--text-sec);">Ask questions. Find the imposter.</p>
            <button onclick="location.reload()">New Game</button>
        </div>
    </div>
</div>

<script>
    const categories = {
        "Food": ["Pizza", "Burger", "Pasta", "Sandwich", "Chocolate", "Ice cream", "Mango", "Banana", "Rice", "Noodles", "Chicken", "Fish", "Milk", "Cheese", "Cake", "Bread"],
        "Animals": ["Lion", "Tiger", "Elephant", "Giraffe", "Monkey", "Kangaroo", "Dog", "Cat", "Horse", "Zebra", "Bear", "Wolf", "Snake", "Eagle", "Shark", "Dolphin"],
        "Countries": ["India", "China", "USA", "UK", "Japan", "Brazil", "Russia", "Canada", "France", "Germany", "Italy", "Spain", "Australia", "Egypt", "Nepal", "UAE"],
        "Movies": ["Avatar", "Titanic", "Inception", "Joker", "Frozen", "Batman", "Avengers", "Harry Potter", "Spiderman", "Kung Fu Panda", "Minions", "Interstellar", "Dune", "Terminator", "Matrix", "Jurassic Park"],
        "Hobbies": ["Reading", "Painting", "Gaming", "Cooking", "Gardening", "Hiking", "Swimming", "Dancing", "Fishing", "Knitting", "Writing", "Photography", "Singing", "Yoga", "Camping", "Running"],
        "Weather & Seasons": ["Rain", "Snow", "Sun", "Wind", "Cloud", "Storm", "Tornado", "Hurricane", "Spring", "Summer", "Autumn", "Winter", "Hail", "Fog", "Lightning", "Thunder"],
        "School Subjects": ["Math", "Science", "History", "Art", "Music", "English", "Geography", "Biology", "Chemistry", "Physics", "Drama", "Gym", "Computing", "Health", "Spanish", "French"],
        "Clothing": ["Shirt", "Pants", "Socks", "Shoes", "Hat", "Coat", "Dress", "Skirt", "Gloves", "Scarf", "Belt", "Tie", "Boots", "Shorts", "Sweater", "Jacket"],
        "Body Parts": ["Head", "Arm", "Leg", "Hand", "Foot", "Eye", "Ear", "Nose", "Mouth", "Neck", "Back", "Chest", "Knee", "Hair", "Finger", "Toe"],
        "Instruments": ["Guitar", "Piano", "Violin", "Drums", "Flute", "Trumpet", "Saxophone", "Cello", "Bass", "Clarinet", "Harp", "Trombone", "Banjo", "Ukulele", "Accordion", "Oboe"],
        "Furniture": ["Bed", "Chair", "Table", "Sofa", "Desk", "Lamp", "Dresser", "Mirror", "Rug", "Bookshelf", "Cabinet", "Couch", "Stool", "Bench", "Clock", "Plant"],
        "Professions": ["Doctor", "Teacher", "Police", "Firefighter", "Chef", "Pilot", "Artist", "Writer", "Engineer", "Lawyer", "Nurse", "Actor", "Musician", "Scientist", "Farmer", "Builder"],
        "Sports": ["Soccer", "Basketball", "Baseball", "Tennis", "Golf", "Swimming", "Volleyball", "Boxing", "Rugby", "Cricket", "Hockey", "Track", "Gymnastics", "Cycling", "Skiing", "Surfing"],
        "Transportation": ["Car", "Truck", "Bus", "Train", "Airplane", "Helicopter", "Boat", "Ship", "Submarine", "Bicycle", "Motorcycle", "Scooter", "Skateboard", "Tractor", "Rocket", "Balloon"]
    };

    let totalPlayers = 0;
    let currentPlayer = 1;
    let imposterIndex = 0;
    let secretWord = "";
    let currentWords = [];

    const gridEl = document.getElementById('reference-grid');

    // Initialize Game State on Load
    function initApp() {
        const categoryNames = Object.keys(categories);
        const randomCat = categoryNames[Math.floor(Math.random() * categoryNames.length)];
        currentWords = categories[randomCat];

        document.getElementById('category-title').innerText = randomCat;

        // Build the pinned top grid
        gridEl.innerHTML = '';
        currentWords.forEach(w => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerText = w;
            gridEl.appendChild(div);
        });
    }

    // Run setup immediately
    initApp();

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function refreshCategory() {
        const categoryNames = Object.keys(categories);
        let newCat = categoryNames[Math.floor(Math.random() * categoryNames.length)];
        // Avoid same category if possible
        const currentCat = document.getElementById('category-title').innerText;
        if (categoryNames.length > 1 && newCat === currentCat) {
            const others = categoryNames.filter(c => c !== currentCat);
            newCat = others[Math.floor(Math.random() * others.length)];
        }
        currentWords = categories[newCat];
        document.getElementById('category-title').innerText = newCat;

        gridEl.innerHTML = '';
        currentWords.forEach(w => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerText = w;
            gridEl.appendChild(div);
        });
    }

    function startGame() {
        totalPlayers = parseInt(document.getElementById('player-count').value);
        if(totalPlayers < 3) { alert("Need at least 3 players!"); return; }

        imposterIndex = Math.floor(Math.random() * totalPlayers) + 1; // 1 to N
        secretWord = currentWords[Math.floor(Math.random() * currentWords.length)];
        
        currentPlayer = 1;
        updatePassScreen();
    }

    function updatePassScreen() {
        document.getElementById('pass-title').innerText = `Player ${currentPlayer}`;
        showScreen('pass-screen');
    }

    function reveal() {
        const display = document.getElementById('secret-display');
        if (currentPlayer === imposterIndex) {
            display.innerHTML = `
                <div class="role-card">
                    <div class="role-label">You are</div>
                    <div class="imposter-text">The Imposter</div>
                    <div class="hint-text">Try to blend in...</div>
                </div>`;
        } else {
            display.innerHTML = `
                <div class="role-card">
                    <div class="role-label">The word is</div>
                    <div class="word-text">${secretWord}</div>
                </div>`;
        }

        const nextBtn = document.getElementById('next-btn');
        if (currentPlayer < totalPlayers) {
            nextBtn.innerText = "Hide & Pass";
        } else {
            nextBtn.innerText = "Start Game";
        }
        
        showScreen('reveal-screen');
    }

    function nextPlayer() {
        if (currentPlayer < totalPlayers) {
            currentPlayer++;
            updatePassScreen();
        } else {
            showScreen('end-screen');
        }
    }
</script>

</body>
</html>
