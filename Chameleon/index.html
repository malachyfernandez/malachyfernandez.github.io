<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposter - Mega Edition</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --danger: #cf6679;
            --text: #ffffff;
            --text-sec: #b3b3b3;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }
        #app {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.3s; }
        
        /* 16 Words Grid */
        #reference-grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        .grid-item {
            background-color: var(--surface);
            padding: 10px 2px;
            border-radius: 4px;
            font-size: 0.70rem;
            font-weight: bold;
            border: 1px solid #333;
            word-wrap: break-word;
        }
        
        /* Controls */
        input[type="number"] {
            font-size: 2rem;
            width: 100px;
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--primary);
            border-radius: 8px;
        }
        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 15px;
        }
        .category-badge {
            background-color: #333;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .imposter-text { color: var(--danger); font-size: 2.5rem; font-weight: bold; text-transform: uppercase; margin: 20px 0;}
        .word-text { color: var(--primary); font-size: 2.5rem; font-weight: bold; text-transform: uppercase; margin: 20px 0;}
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="reference-grid"></div>

    <div id="setup-screen" class="screen active">
        <h1>Imposter</h1>
        <div id="category-title" class="category-badge">Loading Category...</div>
        <p>How many players?</p>
        <input type="number" id="player-count" value="4" min="3" max="20">
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="pass-screen" class="screen">
        <div style="font-size: 4rem;">📱</div>
        <h1 id="pass-title">Player 1</h1>
        <p>Pass the phone to this player. Keep it hidden!</p>
        <button onclick="reveal()">Reveal Role</button>
    </div>

    <div id="reveal-screen" class="screen">
        <h2>You are...</h2>
        <div id="secret-display"></div>
        <button id="next-btn" onclick="nextPlayer()"></button>
    </div>
    
    <div id="end-screen" class="screen">
        <h1>Let the game begin!</h1>
        <p>Ask questions. Find the imposter.</p>
        <button onclick="location.reload()">New Game (New Category)</button>
    </div>
</div>

<script>
    const categories = {
        "Food": ["Pizza", "Burger", "Pasta", "Sandwich", "Chocolate", "Ice cream", "Mango", "Banana", "Rice", "Noodles", "Chicken", "Fish", "Milk", "Cheese", "Cake", "Bread"],
        "Animals": ["Lion", "Tiger", "Elephant", "Giraffe", "Monkey", "Kangaroo", "Dog", "Cat", "Horse", "Zebra", "Bear", "Wolf", "Snake", "Eagle", "Shark", "Dolphin"],
        "Countries": ["India", "China", "USA", "UK", "Japan", "Brazil", "Russia", "Canada", "France", "Germany", "Italy", "Spain", "Australia", "Egypt", "Nepal", "UAE"],
        "Movies": ["Avatar", "Titanic", "Inception", "Joker", "Frozen", "Batman", "Avengers", "Harry Potter", "Spiderman", "Kung Fu Panda", "Minions", "Interstellar", "Dune", "Terminator", "Matrix", "Jurassic Park"],
        "Hobbies": ["Reading", "Painting", "Gaming", "Cooking", "Gardening", "Hiking", "Swimming", "Dancing", "Fishing", "Knitting", "Writing", "Photography", "Singing", "Yoga", "Camping", "Running"],
        "Weather & Seasons": ["Rain", "Snow", "Sun", "Wind", "Cloud", "Storm", "Tornado", "Hurricane", "Spring", "Summer", "Autumn", "Winter", "Hail", "Fog", "Lightning", "Thunder"],
        "School Subjects": ["Math", "Science", "History", "Art", "Music", "English", "Geography", "Biology", "Chemistry", "Physics", "Drama", "Gym", "Computing", "Health", "Spanish", "French"],
        "Clothing": ["Shirt", "Pants", "Socks", "Shoes", "Hat", "Coat", "Dress", "Skirt", "Gloves", "Scarf", "Belt", "Tie", "Boots", "Shorts", "Sweater", "Jacket"],
        "Body Parts": ["Head", "Arm", "Leg", "Hand", "Foot", "Eye", "Ear", "Nose", "Mouth", "Neck", "Back", "Chest", "Knee", "Hair", "Finger", "Toe"],
        "Instruments": ["Guitar", "Piano", "Violin", "Drums", "Flute", "Trumpet", "Saxophone", "Cello", "Bass", "Clarinet", "Harp", "Trombone", "Banjo", "Ukulele", "Accordion", "Oboe"],
        "Furniture": ["Bed", "Chair", "Table", "Sofa", "Desk", "Lamp", "Dresser", "Mirror", "Rug", "Bookshelf", "Cabinet", "Couch", "Stool", "Bench", "Clock", "Plant"],
        "Professions": ["Doctor", "Teacher", "Police", "Firefighter", "Chef", "Pilot", "Artist", "Writer", "Engineer", "Lawyer", "Nurse", "Actor", "Musician", "Scientist", "Farmer", "Builder"],
        "Sports": ["Soccer", "Basketball", "Baseball", "Tennis", "Golf", "Swimming", "Volleyball", "Boxing", "Rugby", "Cricket", "Hockey", "Track", "Gymnastics", "Cycling", "Skiing", "Surfing"],
        "Transportation": ["Car", "Truck", "Bus", "Train", "Airplane", "Helicopter", "Boat", "Ship", "Submarine", "Bicycle", "Motorcycle", "Scooter", "Skateboard", "Tractor", "Rocket", "Balloon"]
    };

    let totalPlayers = 0;
    let currentPlayer = 1;
    let imposterIndex = 0;
    let secretWord = "";
    let currentWords = [];

    const gridEl = document.getElementById('reference-grid');

    // Initialize Game State on Load
    function initApp() {
        const categoryNames = Object.keys(categories);
        const randomCat = categoryNames[Math.floor(Math.random() * categoryNames.length)];
        currentWords = categories[randomCat];

        document.getElementById('category-title').innerText = randomCat;

        // Build the pinned top grid
        gridEl.innerHTML = '';
        currentWords.forEach(w => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerText = w;
            gridEl.appendChild(div);
        });
    }

    // Run setup immediately
    initApp();

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGame() {
        totalPlayers = parseInt(document.getElementById('player-count').value);
        if(totalPlayers < 3) { alert("Need at least 3 players!"); return; }

        imposterIndex = Math.floor(Math.random() * totalPlayers) + 1; // 1 to N
        secretWord = currentWords[Math.floor(Math.random() * currentWords.length)];
        
        currentPlayer = 1;
        gridEl.style.display = 'grid'; // Show the grid
        updatePassScreen();
    }

    function updatePassScreen() {
        document.getElementById('pass-title').innerText = `Player ${currentPlayer}`;
        showScreen('pass-screen');
    }

    function reveal() {
        const display = document.getElementById('secret-display');
        if (currentPlayer === imposterIndex) {
            display.innerHTML = `<div class="imposter-text">THE IMPOSTER</div><p>Try to blend in!</p>`;
        } else {
            display.innerHTML = `<p>The word is:</p><div class="word-text">${secretWord}</div>`;
        }

        const nextBtn = document.getElementById('next-btn');
        if (currentPlayer < totalPlayers) {
            nextBtn.innerText = "Hide & Pass";
        } else {
            nextBtn.innerText = "Finish";
        }
        
        showScreen('reveal-screen');
    }

    function nextPlayer() {
        if (currentPlayer < totalPlayers) {
            currentPlayer++;
            updatePassScreen();
        } else {
            showScreen('end-screen');
        }
    }
</script>

</body>
</html>
