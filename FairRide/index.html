<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FairRide — Mock Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#f5f0e8; color:#1a1a1a; }
    :root {
      --bg:#f5f0e8; --inner-bg:#faf8f4; --text:#1a1a1a; --subtext:#6b7280;
      --accent:#2d5a2d; --accent-light:rgba(45,90,45,0.1); --border:#d1c9b8;
      --subtle-border:#e5ddd0; --red:#dc2626; --blue:#3b82f6; --yellow:#eab308;
    }
    #root { max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; overflow:hidden; }
    .screen { min-height:100vh; }
    .p-4 { padding:16px; }
    .gap-1 { gap:4px; } .gap-2 { gap:8px; } .gap-3 { gap:12px; } .gap-4 { gap:16px; } .gap-6 { gap:24px; }
    .col { display:flex; flex-direction:column; }
    .row { display:flex; flex-direction:row; }
    .center { align-items:center; justify-content:center; }
    .items-center { align-items:center; }
    .justify-between { justify-content:space-between; }
    .w-full { width:100%; }
    .flex-1 { flex:1; }
    .text-center { text-align:center; }
    .font-medium { font-weight:500; }
    .font-bold { font-weight:700; }
    .text-sm { font-size:12px; }
    .text-xs { font-size:11px; }
    .text-sub { color:var(--subtext); font-size:13px; }
    .text-white { color:#fff; }
    .text-red { color:var(--red); }

    .card { background:var(--inner-bg); border:2px solid var(--border); border-radius:8px; padding:16px; }
    .card-accent { background:var(--accent-light); border:2px solid var(--accent); border-radius:8px; padding:16px; }
    .info-box { background:var(--accent-light); border-radius:8px; padding:12px; }
    .divider { height:1px; background:var(--subtle-border); width:100%; }

    .btn { display:flex; align-items:center; justify-content:center; border-radius:8px; padding:12px 20px; cursor:pointer; border:2px solid var(--border); background:transparent; font-family:'Poppins'; font-size:14px; font-weight:500; transition:all .15s; }
    .btn:hover { opacity:.85; }
    .btn-green { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-black { background:var(--text); color:#fff; border-color:var(--text); }
    .btn-red { background:transparent; color:var(--red); border-color:var(--red); }
    .btn-outline { background:transparent; color:var(--text); }
    .btn-grey { background:#9ca3af; color:#fff; border-color:#9ca3af; }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-lg { padding:16px 20px; font-size:16px; }
    .btn-full { width:100%; }

    .avatar { border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }

    .map-placeholder { background:#e8e0d0; border:2px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
    .map-circle { width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:12px; }

    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot-green { background:var(--accent); }
    .dot-red { background:var(--red); }
    .dot-blue { background:var(--blue); }
    .dot-yellow { background:var(--yellow); }
    .dot-sm { width:8px; height:8px; }

    .star { width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:12px; cursor:pointer; }
    .star-filled { background:var(--accent); color:#fff; }
    .star-empty { background:var(--subtle-border); color:var(--subtext); }
    .star-lg { width:36px; height:36px; font-size:16px; }

    .stat-card { flex:1; background:var(--inner-bg); border:2px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
    .stat-value { font-size:20px; font-weight:700; }
    .stat-label { font-size:12px; color:var(--subtext); font-weight:500; }

    .input { border:none; border-bottom:2px solid var(--border); background:transparent; padding:8px; font-family:'Poppins'; font-size:14px; width:100%; outline:none; }
    .input:focus { border-color:var(--accent); }
    .input-box { border:2px solid var(--border); border-radius:8px; background:transparent; padding:8px 12px; font-family:'Poppins'; font-size:14px; width:100%; outline:none; }

    .navbar { display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--border); background:var(--inner-bg); padding:8px 16px; }
    .nav-tab { padding:4px 12px; font-size:12px; cursor:pointer; border:none; background:transparent; font-family:'Poppins'; }
    .nav-tab-active { border-bottom:2px solid var(--accent); font-weight:500; }
    .nav-tab-inactive { opacity:.6; }

    .ride-type-card { flex:1; border:2px solid var(--border); border-radius:8px; padding:12px; text-align:center; cursor:pointer; transition:all .15s; }
    .ride-type-card.selected { border-color:var(--accent); background:var(--accent-light); }

    .payment-card { border:2px solid var(--border); border-radius:8px; padding:12px; cursor:pointer; }
    .payment-card.selected { border-color:var(--accent); background:var(--accent-light); }

    .badge { background:var(--accent); color:#fff; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:500; }
    .badge-bg { background:var(--text); }

    .earnings-hero { background:var(--accent); border-radius:8px; padding:24px; text-align:center; color:#fff; }
    .complete-icon { width:64px; height:64px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; }

    .phase-bar { border-radius:8px; padding:12px; text-align:center; color:#fff; font-weight:700; }
    .phase-blue { background:var(--blue); }
    .phase-yellow { background:var(--yellow); color:var(--text); }
    .phase-green { background:var(--accent); }

    .eta-circle { width:64px; height:64px; border-radius:50%; border:4px solid var(--accent); display:flex; align-items:center; justify-content:center; }

    .timer-circle { width:48px; height:48px; border-radius:50%; border:4px solid var(--accent); display:flex; align-items:center; justify-content:center; }

    .scrollable { overflow-y:auto; max-height:calc(100vh - 48px); }

    .logo-circle { width:80px; height:80px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:28px; }
    .logo-sm { width:32px; height:32px; font-size:10px; }

    .dashed-line { border-left:2px dashed var(--subtle-border); height:16px; margin-left:5px; }

    .fare-row { display:flex; justify-content:space-between; align-items:center; width:100%; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .animate-pulse { animation:pulse 2s infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script id="app-source" type="text/plain">
const { useState, useEffect, useCallback } = React;

// ── Helpers ──
const fmt = (n) => `$${n.toFixed(2)}`;
const Stars = ({rating, interactive, onRate, size='md'}) => {
  const s = size==='lg'?'star-lg':'star';
  return <div className="row gap-1 items-center">{[1,2,3,4,5].map(i=>{
    const filled = i <= Math.round(rating);
    const el = <div key={i} className={`${s} ${filled?'star-filled':'star-empty'}`}
      onClick={interactive?()=>{if(onRate)onRate(i);}:undefined}>★</div>;
    return el;
  })}{!interactive && <span className="text-sub" style={{marginLeft:4}}>{rating.toFixed(1)}</span>}</div>;
};
const Avatar = ({name,size=40}) => {
  const initials = name.split(' ').map(n=>n[0]||'').slice(0,2).join('').toUpperCase();
  return <div className="avatar" style={{width:size,height:size,fontSize:size*.35}}>{initials}</div>;
};
const StatCard = ({label,value,subtitle}) => (
  <div className="stat-card"><div className="stat-label">{label}</div><div className="stat-value">{value}</div>
  {subtitle&&<div className="text-sub text-xs">{subtitle}</div>}</div>
);
const MapBox = ({height=180, children}) => (
  <div className="map-placeholder" style={{height}}><div className="map-circle">MAP</div>
  <span className="text-sub">Interactive map</span>{children}</div>
);

// ── Fare data ──
const FARE = {baseFare:1.50,perMileCost:10.46,perMinuteCost:2.64,distanceMiles:12.3,durationMinutes:22,
  subtotal:14.60,demandMultiplier:1.0,platformFee:1.17,driverPay:13.43,totalFare:14.60};
const FARE_COMFORT = {...FARE,baseFare:2.50,perMileCost:14.76,perMinuteCost:3.96,subtotal:21.22,
  platformFee:1.70,driverPay:19.52,totalFare:21.22};
const FARE_XL = {...FARE,baseFare:3.50,perMileCost:18.45,perMinuteCost:4.84,subtotal:26.79,
  platformFee:2.14,driverPay:24.65,totalFare:26.79};
const FARES = {economy:FARE,comfort:FARE_COMFORT,xl:FARE_XL};

const FareCard = ({fare,showDriverPay}) => (
  <div className="card"><div className="col gap-2">
    <span className="font-medium">Fare Breakdown</span><div className="divider"/>
    <div className="fare-row"><span className="text-sub">Base fare</span><span>{fmt(fare.baseFare)}</span></div>
    <div className="fare-row"><span className="text-sub">Distance ({fare.distanceMiles} mi)</span><span>{fmt(fare.perMileCost)}</span></div>
    <div className="fare-row"><span className="text-sub">Time ({fare.durationMinutes} min)</span><span>{fmt(fare.perMinuteCost)}</span></div>
    {fare.demandMultiplier>1&&<div className="fare-row"><span className="text-sub">Demand ({fare.demandMultiplier.toFixed(1)}x)</span><span>+{fmt(fare.totalFare-fare.subtotal)}</span></div>}
    <div className="divider"/>
    <div className="fare-row"><span className="text-sub">Platform fee (8%)</span><span>{fmt(fare.platformFee)}</span></div>
    {showDriverPay&&<div className="fare-row"><span className="text-sub">Your earnings (92%)</span><span>{fmt(fare.driverPay)}</span></div>}
    <div className="divider" style={{background:' var(--border)'}}/>
    <div className="fare-row"><span className="font-bold">Total</span><span className="font-bold">{fmt(fare.totalFare)}</span></div>
  </div></div>
);

// ── SCREENS ──

// Role select
const RoleSelect = ({onSelect}) => (
  <div className="screen col center" style={{padding:24}}>
    <div className="col gap-6 center" style={{maxWidth:360,width:'100%'}}>
      <div className="col gap-2 center">
        <div className="logo-circle">FR</div>
        <span className="font-bold" style={{fontSize:28}}>FairRide</span>
        <span className="text-sub text-center">Ride-sharing that is fair for everyone</span>
      </div>
      <div className="col gap-3 w-full">
        <button className="btn btn-green btn-lg btn-full" onClick={()=>onSelect('rider')}>
          <div className="col center"><span className="font-bold text-white">I need a ride</span>
          <span className="text-xs text-white" style={{opacity:.8}}>Affordable rides, transparent pricing</span></div>
        </button>
        <button className="btn btn-black btn-lg btn-full" onClick={()=>onSelect('driver')}>
          <div className="col center"><span className="font-bold text-white">I want to drive</span>
          <span className="text-xs text-white" style={{opacity:.8}}>Keep 92% of every fare</span></div>
        </button>
      </div>
      <div className="info-box"><div className="col gap-1">
        <span className="font-medium text-sm">Why FairRide?</span>
        <span className="text-xs text-sub">Uber takes ~25% of every fare. We take 8%. That means lower prices for riders and higher pay for drivers. No surge pricing — demand adjustments capped at 1.3x.</span>
      </div></div>
    </div>
  </div>
);

// Rider Home
const RiderHome = ({nav}) => {
  const [pickup,setPickup] = useState('');
  const [dropoff,setDropoff] = useState('');
  const [rideType,setRideType] = useState('economy');
  const [showFare,setShowFare] = useState(false);
  const fare = FARES[rideType];
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><Avatar name="Demo Rider" size={48}/>
      <div className="col flex-1"><span className="font-medium">Hello, Demo Rider</span><span className="text-sub">Where are you going?</span></div>
      <button className="btn btn-outline btn-sm" onClick={()=>nav('profile')}>⚙</button>
    </div>
    <MapBox height={180}><div className="row gap-2 items-center"><div className="dot dot-sm dot-green"/><span className="text-sub text-xs">Pickup</span></div></MapBox>
    <div className="card"><div className="col gap-3">
      <div className="row gap-3 items-center"><div className="dot dot-green"/><div className="col flex-1"><span className="text-sub text-xs font-medium">Pickup</span><input className="input" placeholder="Current location" value={pickup} onChange={e=>setPickup(e.target.value)}/></div></div>
      <div className="dashed-line" style={{marginLeft:16}}/>
      <div className="row gap-3 items-center"><div className="dot dot-red"/><div className="col flex-1"><span className="text-sub text-xs font-medium">Dropoff</span><input className="input" placeholder="Where to?" value={dropoff} onChange={e=>setDropoff(e.target.value)}/></div></div>
    </div></div>
    <div className="row gap-2">{['economy','comfort','xl'].map(t=>(
      <div key={t} className={`ride-type-card ${rideType===t?'selected':''}`} onClick={()=>setRideType(t)}>
        <div className="col gap-1 center"><span className={rideType===t?'font-bold':''}>{t.charAt(0).toUpperCase()+t.slice(1)}</span>
        <span className="text-sub text-xs">{t==='xl'?6:4} seats</span>
        <span className="font-medium">{fmt(FARES[t].totalFare)}</span></div>
      </div>
    ))}</div>
    {!showFare ? <button className="btn btn-green btn-lg btn-full" onClick={()=>setShowFare(true)}>Get Fare Estimate</button>
    : <div className="col gap-3"><FareCard fare={fare}/><button className="btn btn-green btn-lg btn-full" onClick={()=>nav('request')}>Request {rideType.charAt(0).toUpperCase()+rideType.slice(1)} Ride</button>
    <span className="text-sub text-center text-xs">You pay only {fmt(fare.totalFare)} — your driver keeps 92%</span></div>}
    <div className="row gap-2"><button className="btn btn-outline flex-1" onClick={()=>nav('history')}>Ride History</button><button className="btn btn-outline flex-1" onClick={()=>nav('payment')}>Payment</button></div>
  </div></div>;
};

// Ride Request
const RideRequest = ({nav}) => {
  const [searching,setSearching] = useState(false);
  const [secs,setSecs] = useState(0);
  useEffect(()=>{if(!searching)return;const i=setInterval(()=>setSecs(s=>s+1),1000);return()=>clearInterval(i);},[searching]);
  useEffect(()=>{if(secs>=6&&searching){setSearching(false);nav('tracking');}},[secs,searching]);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('home')}>←</button><span className="font-bold" style={{fontSize:20}}>Request Ride</span></div>
    <MapBox height={160}><div className="row gap-3"><div className="row gap-1 items-center"><div className="dot dot-sm dot-green"/><span className="text-xs text-sub">Pickup</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-red"/><span className="text-xs text-sub">Dropoff</span></div></div></MapBox>
    <div className="card"><div className="col gap-2">
      <div className="row gap-2 items-center"><div className="dot dot-green"/><div className="col"><span className="text-sub text-xs">Pickup</span><span className="font-medium">123 Main St, Raleigh, NC</span></div></div>
      <div className="dashed-line" style={{marginLeft:5}}/>
      <div className="row gap-2 items-center"><div className="dot dot-red"/><div className="col"><span className="text-sub text-xs">Dropoff</span><span className="font-medium">RDU Airport, Morrisville, NC</span></div></div>
    </div></div>
    <FareCard fare={FARE}/>
    {searching ? <div className="col gap-3 center">
      <div className="timer-circle"><span className="font-bold" style={{fontSize:18}}>{secs}s</span></div>
      <span className="font-medium">Searching for drivers...</span>
      <span className="text-sub">Looking for the nearest available driver</span>
      <button className="btn btn-red btn-full" onClick={()=>{setSearching(false);setSecs(0);}}>Cancel Request</button>
    </div> : <button className="btn btn-green btn-lg btn-full" onClick={()=>{setSearching(true);setSecs(0);}}>Confirm & Request Ride</button>}
    <div className="info-box"><div className="col gap-1"><span className="font-medium text-sm">FairRide Promise</span><span className="text-xs text-sub">Your driver keeps 92% of the fare. No surge pricing — demand adjustments are capped at 1.3x. Transparent pricing, always.</span></div></div>
  </div></div>;
};

// Tracking
const RideTracking = ({nav}) => {
  const [eta,setEta] = useState(5);
  const [phase,setPhase] = useState('arriving');
  useEffect(()=>{if(phase==='done')return;const i=setInterval(()=>setEta(p=>{if(p<=1){if(phase==='arriving'){setPhase('riding');return 12;}setPhase('done');return 0;}return p-1;}),2500);return()=>clearInterval(i);},[phase]);
  useEffect(()=>{if(phase==='done')nav('complete');},[phase]);
  return <div className="scrollable p-4"><div className="col gap-4">
    <span className="font-bold" style={{fontSize:20}}>{phase==='arriving'?'Driver on the way':'Ride in progress'}</span>
    <MapBox height={200}><div className="row gap-3"><div className="row gap-1 items-center"><div className="dot dot-sm dot-blue"/><span className="text-xs text-sub">Driver</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-green"/><span className="text-xs text-sub">Pickup</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-red"/><span className="text-xs text-sub">Dropoff</span></div></div></MapBox>
    <div className="card-accent center"><div className="col center gap-1"><span className="font-bold" style={{fontSize:36}}>{eta}</span><span className="font-medium">{phase==='arriving'?'min until arrival':'min remaining'}</span></div></div>
    <div className="card"><div className="row gap-3 items-center"><Avatar name="Alex D" size={48}/><div className="col flex-1"><span className="font-medium">Alex D.</span><Stars rating={4.8} size="sm"/><span className="text-sub text-xs">Toyota Camry · ABC 1234</span></div><button className="btn btn-outline btn-sm">Contact</button></div></div>
    <div className="card"><div className="col gap-2">
      <div className="row gap-2 items-center"><div className="dot dot-green"/><span className="text-sub">123 Main St, Raleigh, NC</span></div>
      <div className="dashed-line" style={{marginLeft:5}}/>
      <div className="row gap-2 items-center"><div className="dot dot-red"/><span className="text-sub">RDU Airport, Morrisville, NC</span></div>
    </div></div>
    <div className="row items-center justify-between" style={{background:'var(--text)',borderRadius:8,padding:12}}><span className="text-white font-medium">Estimated fare</span><span className="text-white font-bold">{fmt(FARE.totalFare)}</span></div>
    <button className="btn btn-red btn-full" onClick={()=>nav('home')}>Cancel Ride</button>
  </div></div>;
};

// Ride Complete
const RideComplete = ({nav}) => {
  const [rating,setRating] = useState(5);
  const [comment,setComment] = useState('');
  const [rated,setRated] = useState(false);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="col center gap-1"><div className="complete-icon"><span className="text-white font-bold" style={{fontSize:24}}>✓</span></div><span className="font-bold" style={{fontSize:22}}>Ride Complete</span><span className="text-sub">You arrived at your destination</span></div>
    <FareCard fare={FARE}/>
    <div className="card"><div className="col gap-3">
      <div className="row gap-3 items-center"><Avatar name="Alex D" size={48}/><div className="col flex-1"><span className="font-medium">Alex D.</span><span className="text-sub text-xs">Toyota Camry · ABC 1234</span></div></div>
      {!rated ? <div className="col gap-3"><span className="font-medium">Rate your driver</span><Stars rating={rating} interactive onRate={setRating} size="lg"/><input className="input-box" placeholder="Leave a comment (optional)" value={comment} onChange={e=>setComment(e.target.value)}/><button className="btn btn-green btn-full" onClick={()=>setRated(true)}>Submit Rating</button></div>
      : <div className="col center gap-1"><Stars rating={rating}/><span className="text-sub">Rating submitted</span></div>}
    </div></div>
    <div className="info-box"><div className="col gap-1"><span className="font-medium text-sm">Pricing Transparency</span><span className="text-xs text-sub">FairRide took only 8% ({fmt(FARE.platformFee)}) of this fare. Your driver earned {fmt(FARE.driverPay)} (92%).</span></div></div>
    <button className="btn btn-green btn-lg btn-full" onClick={()=>nav('home')}>Done</button>
  </div></div>;
};

// Rider History
const RiderHistory = ({nav}) => {
  const rides = [
    {id:1,pickup:'123 Main St',dropoff:'RDU Airport',type:'Economy',fare:18.42,dist:12.3,dur:22,driver:'Alex D.',rating:5,date:'6/20/2026',status:'completed'},
    {id:2,pickup:'456 Fayetteville St',dropoff:'North Hills Mall',type:'Comfort',fare:12.80,dist:5.2,dur:14,driver:'Maria S.',rating:4,date:'6/19/2026',status:'completed'},
    {id:3,pickup:'NC State University',dropoff:'Downtown Raleigh',type:'Economy',fare:0,dist:3.1,dur:10,date:'6/18/2026',status:'cancelled'},
  ];
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('home')}>←</button><span className="font-bold" style={{fontSize:20}}>Ride History</span></div>
    <div className="row gap-2"><StatCard label="Total Rides" value="3"/><StatCard label="Total Spent" value="$31.22"/><StatCard label="Avg Rating" value="4.5"/></div>
    {rides.map(r=><div key={r.id} className="card"><div className="col gap-2">
      <div className="row items-center justify-between"><div className="row gap-2 items-center"><div className={`dot dot-sm ${r.status==='completed'?'dot-green':'dot-red'}`}/><span className="font-medium">{r.type}</span></div><span className="text-sub text-xs">{r.date}</span></div>
      <div className="col gap-1"><div className="row gap-2 items-center"><div className="dot dot-sm dot-green"/><span className="text-sub text-xs">{r.pickup}</span></div><div className="row gap-2 items-center"><div className="dot dot-sm dot-red"/><span className="text-sub text-xs">{r.dropoff}</span></div></div>
      <div className="row items-center justify-between"><span className="font-medium">{r.fare>0?fmt(r.fare):'—'}</span><div className="row gap-2 items-center"><span className="text-sub text-xs">{r.dist} mi · {r.dur} min</span>{r.rating&&<Stars rating={r.rating} size="sm"/>}</div></div>
      {r.driver&&<span className="text-sub text-xs">Driver: {r.driver}</span>}
    </div></div>)}
  </div></div>;
};

// Rider Payment
const RiderPayment = ({nav}) => {
  const [methods,setMethods] = useState([{id:1,last4:'4242',brand:'VISA',isDefault:true}]);
  const [showAdd,setShowAdd] = useState(false);
  const [cardNum,setCardNum] = useState('');
  const [selected,setSelected] = useState(1);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('home')}>←</button><span className="font-bold" style={{fontSize:20}}>Payment Methods</span></div>
    {methods.map(m=><div key={m.id} className={`payment-card ${selected===m.id?'selected':''}`} onClick={()=>setSelected(m.id)}><div className="row gap-3 items-center">
      <div className="badge-bg badge">{m.brand}</div><span className="font-medium flex-1">•••• {m.last4}</span>{m.isDefault&&<div className="badge">DEFAULT</div>}
    </div></div>)}
    {showAdd ? <div className="card"><div className="col gap-3"><span className="font-medium">Add Payment Method</span><input className="input-box" placeholder="Card number" value={cardNum} onChange={e=>setCardNum(e.target.value)}/><span className="text-sub text-xs">Stripe integration placeholder — in production, this would use Stripe Elements for PCI-compliant card entry.</span><div className="row gap-2"><button className="btn btn-outline flex-1" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn-green flex-1" onClick={()=>{if(cardNum.length>=4){setMethods([...methods,{id:Date.now(),last4:cardNum.slice(-4),brand:cardNum[0]==='4'?'VISA':'MC',isDefault:false}]);setCardNum('');setShowAdd(false);}}}>Add Card</button></div></div></div>
    : <button className="btn btn-green btn-full" onClick={()=>setShowAdd(true)}>Add Payment Method</button>}
    <div className="info-box"><div className="col gap-1"><span className="font-medium text-sm">Secure Payments</span><span className="text-xs text-sub">FairRide uses Stripe for secure payment processing. Your card details are never stored on our servers.</span></div></div>
  </div></div>;
};

// Rider Profile
const RiderProfile = ({nav,onSwitch}) => (
  <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('home')}>←</button><span className="font-bold" style={{fontSize:20}}>Profile</span></div>
    <div className="col center gap-3" style={{paddingTop:16,paddingBottom:16}}><Avatar name="Demo Rider" size={80}/><span className="font-bold" style={{fontSize:22}}>Demo Rider</span><span className="text-sub">demo@fairride.com</span><Stars rating={4.9}/></div>
    <div className="row gap-2"><StatCard label="Member Since" value="6/21/26"/><StatCard label="Rides Taken" value="12"/></div>
    <div className="card"><div className="col gap-3"><span className="font-medium">Account</span><div className="divider"/><div className="fare-row"><span className="text-sub">Phone</span><span>(919) 555-0123</span></div><div className="fare-row"><span className="text-sub">Role</span><span>rider</span></div></div></div>
    <button className="btn btn-outline btn-full" onClick={onSwitch}>Switch to Driver Mode</button>
    <div className="info-box"><div className="col gap-1"><span className="font-medium text-sm">About FairRide</span><span className="text-xs text-sub">FairRide is built on the principle that ride-sharing should be affordable for riders and fair for drivers. We take only 8% — just enough to keep the platform running.</span></div></div>
    <button className="btn btn-red btn-full">Sign Out</button>
  </div></div>
);

// Driver Dashboard
const DriverDashboard = ({nav}) => {
  const [online,setOnline] = useState(false);
  const [simulating,setSimulating] = useState(false);
  useEffect(()=>{if(!simulating)return;const t=setTimeout(()=>{setSimulating(false);nav('offer');},2000);return()=>clearTimeout(t);},[simulating]);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><Avatar name="Demo Driver" size={48}/><div className="col flex-1"><span className="font-medium">Demo Driver</span><Stars rating={4.8} size="sm"/></div><button className="btn btn-outline btn-sm" onClick={()=>nav('d_profile')}>⚙</button></div>
    <button className={`btn ${online?'btn-green':'btn-grey'} btn-lg btn-full`} onClick={()=>setOnline(!online)}><div className="col center"><span className="font-bold text-white">{online?'ONLINE':'OFFLINE'}</span><span className="text-xs text-white" style={{opacity:.8}}>{online?'Tap to go offline':'Tap to go online'}</span></div></button>
    <MapBox height={160}/>
    <span className="font-bold" style={{fontSize:18}}>Today</span>
    <div className="row gap-2"><StatCard label="Earnings" value="$87.50"/><StatCard label="Rides" value="5"/><StatCard label="$/hr" value="$25.00"/></div>
    <div className="card"><div className="col gap-2"><span className="font-medium">Lifetime Stats</span><div className="divider"/><div className="fare-row"><span className="text-sub">Total Rides</span><span className="font-medium">142</span></div><div className="fare-row"><span className="text-sub">Total Earnings</span><span className="font-medium">$3,847.50</span></div><div className="fare-row"><span className="text-sub">Rating</span><Stars rating={4.8} size="sm"/></div></div></div>
    {online&&<button className={`btn btn-outline btn-lg btn-full ${simulating?'animate-pulse':''}`} onClick={()=>setSimulating(true)}>{simulating?'Waiting for request...':'Simulate Ride Request'}</button>}
    <div className="row gap-2"><button className="btn btn-outline flex-1" onClick={()=>nav('earnings')}>Earnings</button><button className="btn btn-outline flex-1" onClick={()=>nav('d_profile')}>Vehicle</button></div>
    <div className="info-box"><div className="col gap-1"><span className="font-medium text-sm">FairRide Driver Benefit</span><span className="text-xs text-sub">You keep 92% of every fare. No hidden deductions, no mandatory insurance upsells. Just fair pay for fair work.</span></div></div>
  </div></div>;
};

// Ride Offer
const RideOffer = ({nav}) => {
  const [secs,setSecs] = useState(30);
  useEffect(()=>{const i=setInterval(()=>setSecs(p=>{if(p<=1){nav('d_dashboard');return 0;}return p-1;}),1000);return()=>clearInterval(i);},[]);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="col center gap-1"><span className="font-bold" style={{fontSize:22}}>New Ride Request</span><div className="timer-circle"><span className="font-bold" style={{fontSize:18}}>{secs}</span></div></div>
    <MapBox height={160}><div className="row gap-3"><div className="row gap-1 items-center"><div className="dot dot-sm dot-green"/><span className="text-xs text-sub">Pickup</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-red"/><span className="text-xs text-sub">Dropoff</span></div></div></MapBox>
    <div className="card"><div className="row gap-3 items-center"><Avatar name="Jordan M" size={48}/><div className="col flex-1"><span className="font-medium">Jordan M.</span><Stars rating={4.7} size="sm"/></div></div></div>
    <div className="card"><div className="col gap-2">
      <div className="row gap-2 items-center"><div className="dot dot-green"/><div className="col flex-1"><span className="text-sub text-xs">Pickup (3 min away)</span><span className="font-medium">123 Main St, Raleigh, NC</span></div></div>
      <div className="dashed-line" style={{marginLeft:5}}/>
      <div className="row gap-2 items-center"><div className="dot dot-red"/><div className="col flex-1"><span className="text-sub text-xs">Dropoff</span><span className="font-medium">RDU Airport, Morrisville, NC</span></div></div>
    </div></div>
    <div className="row gap-2"><div className="stat-card"><div className="stat-label">Distance</div><div className="stat-value" style={{fontSize:16}}>12.3 mi</div></div><div className="stat-card"><div className="stat-label">Est. Time</div><div className="stat-value" style={{fontSize:16}}>22 min</div></div><div className="stat-card" style={{borderColor:'var(--accent)',background:'var(--accent-light)'}}><div className="stat-label">Your Pay</div><div className="stat-value" style={{fontSize:16}}>{fmt(FARE.driverPay)}</div></div></div>
    <FareCard fare={FARE} showDriverPay/>
    <div className="row gap-3"><button className="btn btn-red flex-1 btn-lg" onClick={()=>nav('d_dashboard')}>Decline</button><button className="btn btn-green flex-1 btn-lg" onClick={()=>nav('active_ride')}>Accept</button></div>
  </div></div>;
};

// Active Ride
const ActiveRide = ({nav}) => {
  const [phase,setPhase] = useState('to_pickup');
  const [eta,setEta] = useState(4);
  useEffect(()=>{const i=setInterval(()=>setEta(p=>{if(p<=0)return 0;return p-1;}),2500);return()=>clearInterval(i);},[phase]);
  const phaseLabel = {to_pickup:'Navigating to pickup',waiting:'Waiting for rider',to_dropoff:'En route to destination'};
  const phaseClass = {to_pickup:'phase-blue',waiting:'phase-yellow',to_dropoff:'phase-green'};
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className={`phase-bar ${phaseClass[phase]}`}>{phaseLabel[phase]}</div>
    <MapBox height={200}><div className="row gap-3"><div className="row gap-1 items-center"><div className="dot dot-sm dot-blue"/><span className="text-xs text-sub">Driver</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-green"/><span className="text-xs text-sub">Pickup</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-red"/><span className="text-xs text-sub">Dropoff</span></div></div></MapBox>
    {phase!=='waiting'&&<div className="card-accent center"><div className="col center gap-0"><span className="font-bold" style={{fontSize:32}}>{eta}</span><span>min to {phase==='to_pickup'?'pickup':'dropoff'}</span></div></div>}
    <div className="card"><div className="row gap-3 items-center"><Avatar name="Jordan M" size={48}/><div className="col flex-1"><span className="font-medium">Jordan M.</span><span className="text-sub text-xs">Economy · 1 passenger</span></div><button className="btn btn-outline btn-sm">Contact</button></div></div>
    <div className="card"><div className="col gap-2"><div className="row gap-2 items-center"><div className="dot dot-green"/><span>123 Main St, Raleigh, NC</span></div><div className="dashed-line" style={{marginLeft:5}}/><div className="row gap-2 items-center"><div className="dot dot-red"/><span>RDU Airport, Morrisville, NC</span></div></div></div>
    <div className="row items-center justify-between" style={{background:'var(--text)',borderRadius:8,padding:12}}><span className="text-white">Your earnings</span><span className="text-white font-bold">{fmt(FARE.driverPay)}</span></div>
    {phase==='to_pickup'&&<button className="btn btn-green btn-lg btn-full" onClick={()=>{setPhase('waiting');setEta(0);}}>Arrived at Pickup</button>}
    {phase==='waiting'&&<button className="btn btn-green btn-lg btn-full" onClick={()=>{setPhase('to_dropoff');setEta(12);}}>Start Ride</button>}
    {phase==='to_dropoff'&&<button className="btn btn-green btn-lg btn-full" onClick={()=>nav('d_complete')}>Complete Ride</button>}
  </div></div>;
};

// Driver Ride Complete
const DriverComplete = ({nav}) => {
  const [rating,setRating] = useState(5);
  const [comment,setComment] = useState('');
  const [rated,setRated] = useState(false);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="col center gap-1"><div className="complete-icon"><span className="text-white font-bold" style={{fontSize:24}}>✓</span></div><span className="font-bold" style={{fontSize:22}}>Ride Complete</span></div>
    <div className="earnings-hero"><div className="col center gap-1"><span className="text-xs" style={{opacity:.8}}>You earned</span><span className="font-bold" style={{fontSize:36}}>{fmt(FARE.driverPay)}</span><span className="text-xs" style={{opacity:.8}}>92% of {fmt(FARE.totalFare)} fare</span></div></div>
    <FareCard fare={FARE} showDriverPay/>
    <div className="card"><div className="col gap-3"><div className="row gap-3 items-center"><Avatar name="Jordan M" size={48}/><div className="col flex-1"><span className="font-medium">Jordan M.</span><span className="text-sub text-xs">Economy ride</span></div></div>
      {!rated ? <div className="col gap-3"><span className="font-medium">Rate this rider</span><Stars rating={rating} interactive onRate={setRating} size="lg"/><input className="input-box" placeholder="Leave a comment (optional)" value={comment} onChange={e=>setComment(e.target.value)}/><button className="btn btn-green btn-full" onClick={()=>setRated(true)}>Submit Rating</button></div>
      : <div className="col center gap-1"><Stars rating={rating}/><span className="text-sub">Rating submitted</span></div>}
    </div></div>
    <div className="row gap-2"><div className="stat-card"><div className="stat-label">Distance</div><div className="stat-value" style={{fontSize:16}}>12.3 mi</div></div><div className="stat-card"><div className="stat-label">Duration</div><div className="stat-value" style={{fontSize:16}}>22 min</div></div><div className="stat-card" style={{borderColor:'var(--accent)',background:'var(--accent-light)'}}><div className="stat-label">$/mi</div><div className="stat-value" style={{fontSize:16}}>{fmt(FARE.driverPay/12.3)}</div></div></div>
    <button className="btn btn-green btn-lg btn-full" onClick={()=>nav('d_dashboard')}>Back to Dashboard</button>
  </div></div>;
};

// Driver Earnings
const DriverEarnings = ({nav}) => {
  const [period,setPeriod] = useState('today');
  const data = {today:{e:87.50,r:5,h:3.5},week:{e:524.30,r:28,h:22},month:{e:2150,r:118,h:89},all:{e:3847.50,r:142,h:108}};
  const s = data[period];
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('d_dashboard')}>←</button><span className="font-bold" style={{fontSize:20}}>Earnings</span></div>
    <div className="row gap-1">{['today','week','month','all'].map(p=><button key={p} className={`btn btn-sm flex-1 ${period===p?'btn-green':'btn-outline'}`} onClick={()=>setPeriod(p)}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>)}</div>
    <div className="earnings-hero"><div className="col center gap-1"><span className="text-xs" style={{opacity:.8}}>Total Earnings</span><span className="font-bold" style={{fontSize:40}}>{fmt(s.e)}</span></div></div>
    <div className="row gap-2"><StatCard label="Rides" value={String(s.r)}/><StatCard label="Hours" value={s.h.toFixed(1)}/><StatCard label="$/hr" value={fmt(s.e/s.h)}/></div>
    <div className="row gap-2"><StatCard label="Avg/Ride" value={fmt(s.e/s.r)}/><StatCard label="Platform Fee" value="8%" subtitle="Industry-low"/></div>
    <div className="card"><div className="col gap-2"><span className="font-medium">Earnings vs. Uber</span><div className="divider"/><div className="fare-row"><span className="text-sub">Same rides on Uber</span><span>~{fmt(s.e*0.75/0.92)}</span></div><div className="fare-row"><span className="text-sub">Uber driver pay (75%)</span><span>~{fmt(s.e*0.75/0.92*0.75)}</span></div><div className="fare-row"><span className="font-medium" style={{color:'var(--accent)'}}>FairRide driver pay (92%)</span><span className="font-bold">{fmt(s.e)}</span></div><div className="info-box" style={{marginTop:4}}><span className="text-xs text-sub">You earn ~{((0.92/0.75-1)*100).toFixed(0)}% more on FairRide compared to Uber for the same rides.</span></div></div></div>
  </div></div>;
};

// Driver Profile
const DriverProfile = ({nav,onSwitch}) => (
  <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('d_dashboard')}>←</button><span className="font-bold" style={{fontSize:20}}>Driver Profile</span></div>
    <div className="col center gap-3" style={{paddingTop:16,paddingBottom:16}}><Avatar name="Demo Driver" size={80}/><span className="font-bold" style={{fontSize:22}}>Demo Driver</span><Stars rating={4.8}/><span className="text-sub">driver@fairride.com</span></div>
    <div className="row gap-2"><StatCard label="Rides" value="142"/><StatCard label="Earned" value="$3,847"/><StatCard label="Rating" value="4.8"/></div>
    <div className="card"><div className="col gap-3"><span className="font-medium">Vehicle Info</span><div className="divider"/><div className="fare-row"><span className="text-sub">Vehicle</span><span>2022 Toyota Camry</span></div><div className="fare-row"><span className="text-sub">Color</span><span>Silver</span></div><div className="fare-row"><span className="text-sub">License Plate</span><span>ABC 1234</span></div><div className="fare-row"><span className="text-sub">Capacity</span><span>4 passengers</span></div></div></div>
    <div className="card"><div className="col gap-3"><span className="font-medium">Account</span><div className="divider"/><div className="fare-row"><span className="text-sub">Phone</span><span>(919) 555-0456</span></div><div className="fare-row"><span className="text-sub">Status</span><span>offline</span></div></div></div>
    <button className="btn btn-outline btn-full" onClick={onSwitch}>Switch to Rider Mode</button>
    <button className="btn btn-red btn-full">Sign Out</button>
  </div></div>
);

// ── MAIN APP ──
const App = () => {
  const [mode,setMode] = useState('role_select'); // role_select | rider | driver
  const [riderScreen,setRiderScreen] = useState('home');
  const [driverScreen,setDriverScreen] = useState('d_dashboard');

  const riderNav = useCallback((s) => setRiderScreen(s), []);
  const driverNav = useCallback((s) => setDriverScreen(s), []);

  if (mode === 'role_select') return <RoleSelect onSelect={(r)=>{setMode(r);if(r==='rider')setRiderScreen('home');else setDriverScreen('d_dashboard');}}/>;

  const RiderNavBar = () => <div className="navbar"><div className="logo-sm avatar" style={{width:32,height:32,fontSize:10}}>FR</div><div className="row gap-1">{[['Home','home'],['History','history'],['Payment','payment'],['Profile','profile']].map(([l,v])=><button key={v} className={`nav-tab ${riderScreen===v?'nav-tab-active':'nav-tab-inactive'}`} onClick={()=>riderNav(v)}>{l}</button>)}</div></div>;
  const DriverNavBar = () => <div className="navbar"><div style={{width:32,height:32,fontSize:10,borderRadius:16,background:'var(--text)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>FR</div><div className="row gap-1">{[['Dashboard','d_dashboard'],['Earnings','earnings'],['Profile','d_profile']].map(([l,v])=><button key={v} className={`nav-tab ${driverScreen===v?'nav-tab-active':'nav-tab-inactive'}`} onClick={()=>driverNav(v)}>{l}</button>)}</div></div>;

  if (mode === 'rider') {
    const screens = {home:<RiderHome nav={riderNav}/>,request:<RideRequest nav={riderNav}/>,tracking:<RideTracking nav={riderNav}/>,complete:<RideComplete nav={riderNav}/>,history:<RiderHistory nav={riderNav}/>,payment:<RiderPayment nav={riderNav}/>,profile:<RiderProfile nav={riderNav} onSwitch={()=>{setMode('driver');setDriverScreen('d_dashboard');}}/>};
    return <div><RiderNavBar/>{screens[riderScreen]||<RiderHome nav={riderNav}/>}</div>;
  }

  if (mode === 'driver') {
    const screens = {d_dashboard:<DriverDashboard nav={driverNav}/>,offer:<RideOffer nav={driverNav}/>,active_ride:<ActiveRide nav={driverNav}/>,d_complete:<DriverComplete nav={driverNav}/>,earnings:<DriverEarnings nav={driverNav}/>,d_profile:<DriverProfile nav={driverNav} onSwitch={()=>{setMode('rider');setRiderScreen('home');}}/>};
    return <div><DriverNavBar/>{screens[driverScreen]||<DriverDashboard nav={driverNav}/>}</div>;
  }
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
try {
  var src = document.getElementById('app-source').textContent;
  var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] });
  eval(out.code);
} catch(e) { document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">' + e.message + '</pre>'; console.error(e); }
</script>
</body>
</html>
