<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FairRide — Mock Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#f1ede3; --inner-bg:#fffdf7; --text:#15201a; --subtext:#6b7670;
      --accent:#1f5d3a; --accent-2:#2e8b57; --accent-grad:linear-gradient(135deg,#1f5d3a 0%,#2e8b57 100%);
      --accent-light:rgba(46,139,87,0.12); --gold:#c9a24b; --gold-light:rgba(201,162,75,0.14);
      --border:#e4ddcd; --subtle-border:#ece6d8; --red:#d6453b; --blue:#3b82f6; --yellow:#e0a92e;
      --shadow:0 10px 30px -12px rgba(31,93,58,0.28); --shadow-sm:0 4px 14px -6px rgba(20,32,26,0.18);
    }
    html { -webkit-font-smoothing:antialiased; }
    body { font-family:'Poppins',sans-serif; color:var(--text);
      background:
        radial-gradient(900px 520px at 18% -8%, rgba(46,139,87,0.16), transparent 60%),
        radial-gradient(760px 520px at 108% 12%, rgba(201,162,75,0.16), transparent 55%),
        var(--bg);
      background-attachment:fixed; }
    #root { max-width:430px; margin:0 auto; min-height:100vh; position:relative; overflow:hidden;
      box-shadow:0 0 60px -10px rgba(20,32,26,0.18); }
    .screen { min-height:100vh; }
    /* screen + stagger entrance */
    @keyframes screenIn { from{opacity:0; transform:translateY(14px) scale(.99);} to{opacity:1; transform:none;} }
    .screen-anim { animation:screenIn .42s cubic-bezier(.22,1,.36,1) both; }
    @keyframes riseIn { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }
    .screen-anim .scrollable > .col > *, .screen-anim > .col > .col > * { animation:riseIn .5s cubic-bezier(.22,1,.36,1) both; }
    .screen-anim .scrollable > .col > *:nth-child(1){animation-delay:.02s}
    .screen-anim .scrollable > .col > *:nth-child(2){animation-delay:.07s}
    .screen-anim .scrollable > .col > *:nth-child(3){animation-delay:.12s}
    .screen-anim .scrollable > .col > *:nth-child(4){animation-delay:.17s}
    .screen-anim .scrollable > .col > *:nth-child(5){animation-delay:.22s}
    .screen-anim .scrollable > .col > *:nth-child(6){animation-delay:.27s}
    .screen-anim .scrollable > .col > *:nth-child(7){animation-delay:.32s}
    .screen-anim .scrollable > .col > *:nth-child(n+8){animation-delay:.36s}
    @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
    .p-4 { padding:16px; }
    .gap-1 { gap:4px; } .gap-2 { gap:8px; } .gap-3 { gap:12px; } .gap-4 { gap:16px; } .gap-6 { gap:24px; }
    .col { display:flex; flex-direction:column; }
    .row { display:flex; flex-direction:row; }
    .center { align-items:center; justify-content:center; }
    .items-center { align-items:center; }
    .justify-between { justify-content:space-between; }
    .w-full { width:100%; }
    .flex-1 { flex:1; }
    .text-center { text-align:center; }
    .font-medium { font-weight:500; }
    .font-bold { font-weight:700; }
    .text-sm { font-size:12px; }
    .text-xs { font-size:11px; }
    .text-sub { color:var(--subtext); font-size:13px; }
    .text-white { color:#fff; }
    .text-red { color:var(--red); }

    .card { background:var(--inner-bg); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:var(--shadow-sm); transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s; }
    .card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
    .card-accent { background:linear-gradient(135deg, var(--accent-light), rgba(201,162,75,0.10)); border:1px solid rgba(46,139,87,0.35); border-radius:16px; padding:16px; box-shadow:var(--shadow-sm); }
    .info-box { background:var(--gold-light); border:1px solid rgba(201,162,75,0.3); border-radius:14px; padding:12px; }
    .divider { height:1px; background:var(--subtle-border); width:100%; }

    .btn { display:flex; align-items:center; justify-content:center; border-radius:14px; padding:12px 20px; cursor:pointer; border:1.5px solid var(--border); background:var(--inner-bg); font-family:'Poppins'; font-size:14px; font-weight:600; transition:transform .12s cubic-bezier(.22,1,.36,1), box-shadow .2s, opacity .2s; }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:translateY(0) scale(.97); }
    .btn-green { background:var(--accent-grad); color:#fff; border-color:transparent; box-shadow:0 8px 20px -8px rgba(31,93,58,0.6); }
    .btn-black { background:linear-gradient(135deg,#1b2620,#2c3a31); color:#fff; border-color:transparent; box-shadow:0 8px 20px -8px rgba(20,32,26,0.5); }
    .btn-red { background:transparent; color:var(--red); border-color:rgba(214,69,59,0.5); }
    .btn-outline { background:var(--inner-bg); color:var(--text); }
    .btn-grey { background:#aab2ac; color:#fff; border-color:transparent; }
    .btn-sm { padding:6px 12px; font-size:12px; border-radius:10px; }
    .btn-lg { padding:16px 20px; font-size:16px; }
    .btn-full { width:100%; }

    .avatar { border-radius:50%; background:var(--accent-grad); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; box-shadow:0 6px 16px -8px rgba(31,93,58,0.6); }

    .map-placeholder { position:relative; overflow:hidden; background:linear-gradient(135deg,#dfe7df,#eef0e2); border:1px solid var(--border); border-radius:16px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; box-shadow:var(--shadow-sm); }
    .map-placeholder::before { content:''; position:absolute; inset:-40%; background:
      repeating-linear-gradient(115deg, rgba(46,139,87,0.07) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(25deg, rgba(46,139,87,0.07) 0 2px, transparent 2px 26px);
      animation:mapPan 18s linear infinite; }
    @keyframes mapPan { from{transform:translate(0,0);} to{transform:translate(26px,26px);} }
    .map-circle { position:relative; z-index:1; width:48px; height:48px; border-radius:50%; background:var(--accent-grad); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:12px; box-shadow:0 0 0 0 rgba(46,139,87,0.5); animation:pinPulse 2.2s ease-out infinite; }
    @keyframes pinPulse { 0%{box-shadow:0 0 0 0 rgba(46,139,87,0.45);} 70%{box-shadow:0 0 0 18px rgba(46,139,87,0);} 100%{box-shadow:0 0 0 0 rgba(46,139,87,0);} }

    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot-green { background:var(--accent-2); box-shadow:0 0 0 3px rgba(46,139,87,0.18); }
    .dot-red { background:var(--red); }
    .dot-blue { background:var(--blue); }
    .dot-yellow { background:var(--yellow); }
    .dot-sm { width:8px; height:8px; }

    .star { width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:12px; cursor:pointer; }
    .star-filled { background:var(--gold); color:#fff; box-shadow:0 4px 10px -4px rgba(201,162,75,0.7); }
    .star-empty { background:var(--subtle-border); color:var(--subtext); }
    .star-lg { width:36px; height:36px; font-size:16px; }

    .stat-card { flex:1; background:var(--inner-bg); border:1px solid var(--border); border-radius:14px; padding:12px; text-align:center; box-shadow:var(--shadow-sm); transition:transform .2s; }
    .stat-card:hover { transform:translateY(-2px); }
    .stat-value { font-size:20px; font-weight:700; }
    .stat-label { font-size:12px; color:var(--subtext); font-weight:500; }

    .input { border:none; border-bottom:2px solid var(--border); background:transparent; padding:8px; font-family:'Poppins'; font-size:14px; width:100%; outline:none; }
    .input:focus { border-color:var(--accent); }
    .input-box { border:2px solid var(--border); border-radius:8px; background:transparent; padding:8px 12px; font-family:'Poppins'; font-size:14px; width:100%; outline:none; }

    .navbar { display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--border); background:var(--inner-bg); padding:8px 16px; }
    .nav-tab { padding:4px 12px; font-size:12px; cursor:pointer; border:none; background:transparent; font-family:'Poppins'; }
    .nav-tab-active { border-bottom:2px solid var(--accent); font-weight:500; }
    .nav-tab-inactive { opacity:.6; }

    .ride-type-card { flex:1; background:var(--inner-bg); border:1.5px solid var(--border); border-radius:14px; padding:12px; text-align:center; cursor:pointer; transition:transform .18s cubic-bezier(.22,1,.36,1), border-color .2s, box-shadow .2s; box-shadow:var(--shadow-sm); }
    .ride-type-card:hover { transform:translateY(-2px); }
    .ride-type-card.selected { border-color:var(--accent-2); background:var(--accent-light); transform:translateY(-3px) scale(1.02); box-shadow:var(--shadow); }

    .payment-card { background:var(--inner-bg); border:1.5px solid var(--border); border-radius:14px; padding:12px; cursor:pointer; transition:transform .18s, border-color .2s; box-shadow:var(--shadow-sm); }
    .payment-card:hover { transform:translateY(-2px); }
    .payment-card.selected { border-color:var(--accent-2); background:var(--accent-light); }

    .badge { background:var(--accent-grad); color:#fff; padding:2px 8px; border-radius:8px; font-size:10px; font-weight:600; }
    .badge-bg { background:linear-gradient(135deg,#1b2620,#2c3a31); }

    .earnings-hero { position:relative; overflow:hidden; background:var(--accent-grad); border-radius:18px; padding:24px; text-align:center; color:#fff; box-shadow:var(--shadow); }
    .earnings-hero::after { content:''; position:absolute; top:-60%; left:-30%; width:80%; height:200%; background:linear-gradient(115deg, transparent, rgba(255,255,255,0.18), transparent); transform:skewX(-18deg); animation:sheen 3.4s ease-in-out infinite; }
    @keyframes sheen { 0%{left:-40%;} 55%,100%{left:130%;} }
    .complete-icon { width:64px; height:64px; border-radius:50%; background:var(--accent-grad); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 26px -8px rgba(31,93,58,0.7); animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes popIn { from{transform:scale(0); opacity:0;} to{transform:scale(1); opacity:1;} }

    .phase-bar { border-radius:8px; padding:12px; text-align:center; color:#fff; font-weight:700; }
    .phase-blue { background:var(--blue); }
    .phase-yellow { background:var(--yellow); color:var(--text); }
    .phase-green { background:var(--accent); }

    .eta-circle { width:64px; height:64px; border-radius:50%; border:4px solid var(--accent-2); display:flex; align-items:center; justify-content:center; }

    .timer-circle { position:relative; width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--inner-bg); }
    .timer-circle::before { content:''; position:absolute; inset:-4px; border-radius:50%; background:conic-gradient(var(--accent-2) 0turn, var(--accent-2) 1turn); -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px)); mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px)); animation:spinSweep 1.4s linear infinite; }
    @keyframes spinSweep { to{transform:rotate(1turn);} }

    .scrollable { overflow-y:auto; max-height:calc(100vh - 48px); }

    .logo-circle { width:80px; height:80px; border-radius:50%; background:var(--accent-grad); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:28px; box-shadow:0 14px 34px -10px rgba(31,93,58,0.7); animation:popIn .55s cubic-bezier(.34,1.56,.64,1) both; }
    .logo-sm { width:32px; height:32px; font-size:10px; }

    .dashed-line { border-left:2px dashed var(--subtle-border); height:16px; margin-left:5px; }

    .fare-row { display:flex; justify-content:space-between; align-items:center; width:100%; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .animate-pulse { animation:pulse 1.6s infinite; }
    /* concentric search rings */
    .search-rings { position:relative; width:84px; height:84px; display:flex; align-items:center; justify-content:center; }
    .search-rings span { position:absolute; border-radius:50%; border:2px solid var(--accent-2); opacity:0; animation:ring 2s ease-out infinite; }
    .search-rings span:nth-child(1){ width:28px; height:28px; }
    .search-rings span:nth-child(2){ width:28px; height:28px; animation-delay:.66s; }
    .search-rings span:nth-child(3){ width:28px; height:28px; animation-delay:1.33s; }
    @keyframes ring { 0%{transform:scale(.5); opacity:.8;} 100%{transform:scale(3); opacity:0;} }
    .search-core { width:30px; height:30px; border-radius:50%; background:var(--accent-grad); z-index:1; box-shadow:0 6px 16px -6px rgba(31,93,58,0.7); }
    /* online glow toggle */
    .btn-green.glow { animation:glowPulse 2s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100%{box-shadow:0 8px 20px -8px rgba(31,93,58,0.6);} 50%{box-shadow:0 8px 30px -4px rgba(46,139,87,0.9);} }
    .nav-tab-active { position:relative; }
  </style>
</head>
<body>
<div id="root"></div>
<script id="app-source" type="text/plain">
const { useState, useEffect, useCallback } = React;

// ── Helpers ──
const fmt = (n) => `$${n.toFixed(2)}`;
const Stars = ({rating, interactive, onRate, size='md'}) => {
  const s = size==='lg'?'star-lg':'star';
  return <div className="row gap-1 items-center">{[1,2,3,4,5].map(i=>{
    const filled = i <= Math.round(rating);
    const el = <div key={i} className={`${s} ${filled?'star-filled':'star-empty'}`}
      onClick={interactive?()=>{if(onRate)onRate(i);}:undefined}>★</div>;
    return el;
  })}{!interactive && <span className="text-sub" style={{marginLeft:4}}>{rating.toFixed(1)}</span>}</div>;
};
const Avatar = ({name,size=40}) => {
  const initials = name.split(' ').map(n=>n[0]||'').slice(0,2).join('').toUpperCase();
  return <div className="avatar" style={{width:size,height:size,fontSize:size*.35}}>{initials}</div>;
};
const StatCard = ({label,value,subtitle}) => (
  <div className="stat-card"><div className="stat-label">{label}</div><div className="stat-value">{value}</div>
  {subtitle&&<div className="text-sub text-xs">{subtitle}</div>}</div>
);
const MapBox = ({height=180, children}) => (
  <div className="map-placeholder" style={{height}}><div className="map-circle">MAP</div>
  <span className="text-sub">Interactive map</span>{children}</div>
);

// ── Fare data ──
const FARE = {baseFare:1.50,perMileCost:10.46,perMinuteCost:2.64,distanceMiles:12.3,durationMinutes:22,
  subtotal:14.60,demandMultiplier:1.0,platformFee:1.17,driverPay:13.43,totalFare:14.60};
const FARE_COMFORT = {...FARE,baseFare:2.50,perMileCost:14.76,perMinuteCost:3.96,subtotal:21.22,
  platformFee:1.70,driverPay:19.52,totalFare:21.22};
const FARE_XL = {...FARE,baseFare:3.50,perMileCost:18.45,perMinuteCost:4.84,subtotal:26.79,
  platformFee:2.14,driverPay:24.65,totalFare:26.79};
const FARES = {economy:FARE,comfort:FARE_COMFORT,xl:FARE_XL};

const FareCard = ({fare,showDriverPay}) => (
  <div className="card"><div className="col gap-2">
    <span className="font-medium">Fare Breakdown</span><div className="divider"/>
    <div className="fare-row"><span className="text-sub">Base fare</span><span>{fmt(fare.baseFare)}</span></div>
    <div className="fare-row"><span className="text-sub">Distance ({fare.distanceMiles} mi)</span><span>{fmt(fare.perMileCost)}</span></div>
    <div className="fare-row"><span className="text-sub">Time ({fare.durationMinutes} min)</span><span>{fmt(fare.perMinuteCost)}</span></div>
    {fare.demandMultiplier>1&&<div className="fare-row"><span className="text-sub">Demand ({fare.demandMultiplier.toFixed(1)}x)</span><span>+{fmt(fare.totalFare-fare.subtotal)}</span></div>}
    <div className="divider"/>
    <div className="fare-row"><span className="text-sub">Platform fee (8%)</span><span>{fmt(fare.platformFee)}</span></div>
    {showDriverPay&&<div className="fare-row"><span className="text-sub">Your earnings (92%)</span><span>{fmt(fare.driverPay)}</span></div>}
    <div className="divider" style={{background:' var(--border)'}}/>
    <div className="fare-row"><span className="font-bold">Total</span><span className="font-bold">{fmt(fare.totalFare)}</span></div>
  </div></div>
);

// ── SCREENS ──

// Role select
const RoleSelect = ({onSelect}) => (
  <div className="screen col center" style={{padding:24}}>
    <div className="col gap-6 center" style={{maxWidth:360,width:'100%'}}>
      <div className="col gap-2 center">
        <div className="logo-circle">FR</div>
        <span className="font-bold" style={{fontSize:28}}>FairRide</span>
        <span className="text-sub text-center">Ride-sharing that is fair for everyone</span>
      </div>
      <div className="col gap-3 w-full">
        <button className="btn btn-green btn-lg btn-full" onClick={()=>onSelect('rider')}>
          <div className="col center"><span className="font-bold text-white">I need a ride</span>
          <span className="text-xs text-white" style={{opacity:.8}}>Affordable rides, transparent pricing</span></div>
        </button>
        <button className="btn btn-black btn-lg btn-full" onClick={()=>onSelect('driver')}>
          <div className="col center"><span className="font-bold text-white">I want to drive</span>
          <span className="text-xs text-white" style={{opacity:.8}}>Keep 92% of every fare</span></div>
        </button>
      </div>
      <div className="info-box"><div className="col gap-1">
        <span className="font-medium text-sm">Why FairRide?</span>
        <span className="text-xs text-sub">Uber takes ~25% of every fare. We take 8%. That means lower prices for riders and higher pay for drivers. No surge pricing — demand adjustments capped at 1.3x.</span>
      </div></div>
    </div>
  </div>
);

// Rider Home
const RiderHome = ({nav}) => {
  const [pickup,setPickup] = useState('');
  const [dropoff,setDropoff] = useState('');
  const [rideType,setRideType] = useState('economy');
  const [showFare,setShowFare] = useState(false);
  const fare = FARES[rideType];
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><Avatar name="Demo Rider" size={48}/>
      <div className="col flex-1"><span className="font-medium">Hello, Demo Rider</span><span className="text-sub">Where are you going?</span></div>
      <button className="btn btn-outline btn-sm" onClick={()=>nav('profile')}>⚙</button>
    </div>
    <MapBox height={180}><div className="row gap-2 items-center"><div className="dot dot-sm dot-green"/><span className="text-sub text-xs">Pickup</span></div></MapBox>
    <div className="card"><div className="col gap-3">
      <div className="row gap-3 items-center"><div className="dot dot-green"/><div className="col flex-1"><span className="text-sub text-xs font-medium">Pickup</span><input className="input" placeholder="Current location" value={pickup} onChange={e=>setPickup(e.target.value)}/></div></div>
      <div className="dashed-line" style={{marginLeft:16}}/>
      <div className="row gap-3 items-center"><div className="dot dot-red"/><div className="col flex-1"><span className="text-sub text-xs font-medium">Dropoff</span><input className="input" placeholder="Where to?" value={dropoff} onChange={e=>setDropoff(e.target.value)}/></div></div>
    </div></div>
    <div className="row gap-2">{['economy','comfort','xl'].map(t=>(
      <div key={t} className={`ride-type-card ${rideType===t?'selected':''}`} onClick={()=>setRideType(t)}>
        <div className="col gap-1 center"><span className={rideType===t?'font-bold':''}>{t.charAt(0).toUpperCase()+t.slice(1)}</span>
        <span className="text-sub text-xs">{t==='xl'?6:4} seats</span>
        <span className="font-medium">{fmt(FARES[t].totalFare)}</span></div>
      </div>
    ))}</div>
    {!showFare ? <button className="btn btn-green btn-lg btn-full" onClick={()=>setShowFare(true)}>Get Fare Estimate</button>
    : <div className="col gap-3"><FareCard fare={fare}/><button className="btn btn-green btn-lg btn-full" onClick={()=>nav('request')}>Request {rideType.charAt(0).toUpperCase()+rideType.slice(1)} Ride</button>
    <span className="text-sub text-center text-xs">You pay only {fmt(fare.totalFare)} — your driver keeps 92%</span></div>}
    <div className="row gap-2"><button className="btn btn-outline flex-1" onClick={()=>nav('history')}>Ride History</button><button className="btn btn-outline flex-1" onClick={()=>nav('payment')}>Payment</button></div>
  </div></div>;
};

// Ride Request
const RideRequest = ({nav}) => {
  const [searching,setSearching] = useState(false);
  const [secs,setSecs] = useState(0);
  useEffect(()=>{if(!searching)return;const i=setInterval(()=>setSecs(s=>s+1),1000);return()=>clearInterval(i);},[searching]);
  useEffect(()=>{if(secs>=6&&searching){setSearching(false);nav('tracking');}},[secs,searching]);
  return <div className="scrollable p-4"><div className="col gap-4">
    <div className="row gap-3 items-center"><button className="btn btn-outline btn-sm" onClick={()=>nav('home')}>←</button><span className="font-bold" style={{fontSize:20}}>Request Ride</span></div>
    <MapBox height={160}><div className="row gap-3"><div className="row gap-1 items-center"><div className="dot dot-sm dot-green"/><span className="text-xs text-sub">Pickup</span></div><div className="row gap-1 items-center"><div className="dot dot-sm dot-red"/><span className="text-xs text-sub">Dropoff</span></div></div></MapBox>
    <div className="card"><div className="col gap-2">
      <div className="row gap-2 items-center"><div className="dot dot-green"/><div className="col"><span className="text-sub text-xs">Pickup</span><span className="font-medium">123 Main St, Raleigh, NC</span></div></div>
      <div className="dashed-line" style={{marginLeft:5}}/>

    <div className="card"><div className="col gap-3"><span className="font-medium">Vehicle Info</span><div className="divider"/><div className="fare-row"><span className="text-sub">Vehicle</span><span>2022 Toyota Camry</span></div><div className="fare-row"><span className="text-sub">Color</span><span>Silver</span></div><div className="fare-row"><span className="text-sub">License Plate</span><span>ABC 1234</span></div><div className="fare-row"><span className="text-sub">Capacity</span><span>4 passengers</span></div></div></div>
    <div className="card"><div className="col gap-3"><span className="font-medium">Account</span><div className="divider"/><div className="fare-row"><span className="text-sub">Phone</span><span>(919) 555-0456</span></div><div className="fare-row"><span className="text-sub">Status</span><span>offline</span></div></div></div>
    <button className="btn btn-outline btn-full" onClick={onSwitch}>Switch to Rider Mode</button>
    <button className="btn btn-red btn-full">Sign Out</button>
  </div></div>
);

// ── MAIN APP ──
const App = () => {
  const [mode,setMode] = useState('role_select'); // role_select | rider | driver
  const [riderScreen,setRiderScreen] = useState('home');
  const [driverScreen,setDriverScreen] = useState('d_dashboard');

  const riderNav = useCallback((s) => setRiderScreen(s), []);
  const driverNav = useCallback((s) => setDriverScreen(s), []);

  if (mode === 'role_select') return <div key="role" className="screen-anim"><RoleSelect onSelect={(r)=>{setMode(r);if(r==='rider')setRiderScreen('home');else setDriverScreen('d_dashboard');}}/></div>;

  const RiderNavBar = () => <div className="navbar"><div className="logo-sm avatar" style={{width:32,height:32,fontSize:10}}>FR</div><div className="row gap-1">{[['Home','home'],['History','history'],['Payment','payment'],['Profile','profile']].map(([l,v])=><button key={v} className={`nav-tab ${riderScreen===v?'nav-tab-active':'nav-tab-inactive'}`} onClick={()=>riderNav(v)}>{l}</button>)}</div></div>;
  const DriverNavBar = () => <div className="navbar"><div style={{width:32,height:32,fontSize:10,borderRadius:16,background:'var(--text)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>FR</div><div className="row gap-1">{[['Dashboard','d_dashboard'],['Earnings','earnings'],['Profile','d_profile']].map(([l,v])=><button key={v} className={`nav-tab ${driverScreen===v?'nav-tab-active':'nav-tab-inactive'}`} onClick={()=>driverNav(v)}>{l}</button>)}</div></div>;

  if (mode === 'rider') {
    const screens = {home:<RiderHome nav={riderNav}/>,request:<RideRequest nav={riderNav}/>,tracking:<RideTracking nav={riderNav}/>,complete:<RideComplete nav={riderNav}/>,history:<RiderHistory nav={riderNav}/>,payment:<RiderPayment nav={riderNav}/>,profile:<RiderProfile nav={riderNav} onSwitch={()=>{setMode('driver');setDriverScreen('d_dashboard');}}/>};
    return <div><RiderNavBar/><div key={riderScreen} className="screen-anim">{screens[riderScreen]||<RiderHome nav={riderNav}/>}</div></div>;
  }

  if (mode === 'driver') {
    const screens = {d_dashboard:<DriverDashboard nav={driverNav}/>,offer:<RideOffer nav={driverNav}/>,active_ride:<ActiveRide nav={driverNav}/>,d_complete:<DriverComplete nav={driverNav}/>,earnings:<DriverEarnings nav={driverNav}/>,d_profile:<DriverProfile nav={driverNav} onSwitch={()=>{setMode('rider');setRiderScreen('home');}}/>};
    return <div><DriverNavBar/><div key={driverScreen} className="screen-anim">{screens[driverScreen]||<DriverDashboard nav={driverNav}/>}</div></div>;
  }
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
try {
  var src = document.getElementById('app-source').textContent;
  var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] });
  eval(out.code);
} catch(e) { document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px">' + e.message + '</pre>'; console.error(e); }
</script>
</body>
</html>
