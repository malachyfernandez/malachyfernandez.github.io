<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="favicon-32x32.png">
  <style>
    @view-transition {
      navigation: auto;
    }
    :root {
      --primary: #3498db;
      --text: #333;
      --bg-start: #f0f4f8;
      --bg-end: #ffffff;
      --card: #fff;
      --header-start: #3498db;
      --header-end: #8e44ad;
      --radius: 12px;
      --transition: 0.3s ease;
      --font-family: 'Poppins';
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: var(--font-family), sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 3rem 1rem;
      background: linear-gradient(120deg, var(--header-start), var(--header-end));
      color: #fff;
    }
    header h1 {
      font-size: 2.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      white-space: normal;
      overflow-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      view-transition-name: header-title;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    header .nav {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      view-transition-name: header-nav;
    }
    header .nav a,
    header .nav span {
      margin: 0 0.5rem;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-weight: 600;
    }
    header .nav .active {
      color: #fff;
    }
    header .nav .dot {
      color: rgba(255,255,255,0.5);
      cursor: default;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 2rem 1rem;
    }
    .projects-section {
      margin-bottom: 3rem;
    }
    .projects-section h2 {
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin-bottom: 0.25rem;
      font-weight: 600;
    }
    .projects-section .section-subtext {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
    }
    .projects {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      justify-content: center;
    }
    .project-card {
      position: relative;
      background: var(--card);
      padding: 2rem 1.5rem;
      border-radius: var(--radius);
      border-left: 5px solid var(--primary);
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    /* ADD THIS: New dedicated background layer */
    .card-bg {
      position: absolute;
      top: -10px; left: -10px; right: -10px; bottom: -10px; /* Negative inset prevents blurry white edges */
      z-index: 1;
      background-size: cover;
      background-position: center;
      filter: blur(3px); /* Adjust for more/less blur */
    }

    /* UPDATE THIS: Remove background properties here, we moved them to .card-bg */
    .project-card.has-background-image .card-content {
      color: #fff;
      position: relative;
      z-index: 4; /* Puts text above the ::before circle and .card-bg */
      text-align: center;
      transition: opacity var(--transition);
    }
    .project-card.has-background-image .card-content i {
      color: var(--primary);
    }
    .project-card.has-background-image .card-content .type-label {
      color: var(--primary);
    }
    .project-card.has-background-image .card-content p.desc {
      color: rgba(255, 255, 255, 0.8);
    }
    .project-card.has-background-image .card-content .award {
      color: #fff;
      background: linear-gradient(135deg, #d4af37, #b8941f);
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .project-card.has-background-image .btn {
      background: var(--primary);
      color: #fff;
    }
    .project-card.has-background-image .btn:hover {
      background: var(--primary-dark);
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      background: var(--accent-light);
      border-radius: 50%;
      transition: top var(--transition), right var(--transition);
      z-index: 3;
    }
    
    /* --- Touch / Mobile Click Styles --- */
    .project-card.touch-active .card-content {
      opacity: 0.2;
    }
    .project-card.touch-active .card-actions {
      opacity: 1;
      pointer-events: auto;
    }

    /* --- Mouse Hover Styles (Only applies to devices with a mouse) --- */
    @media (hover: hover) {
      .project-card:hover {
        transform: translateY(-6px) rotate(1deg) scale(1.02);
        box-shadow: 0 12px 20px rgba(0,0,0,0.15);
      }
      .project-card:hover::before {
        top: -20px; right: -20px;
      }
      .project-card:hover .card-content {
        opacity: 0.2;
      }
      .project-card:hover .card-content i {
        color: #fff;
      }
      .project-card.has-background-image:hover .card-content i {
        color: var(--primary);
      }
      .project-card:hover .card-actions {
        opacity: 1;
        pointer-events: auto;
      }
    }
    .card-content {
      text-align: center;
      transition: opacity var(--transition);
    }
    .card-content i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--primary);
      transition: color var(--transition);
    }
    .card-content h3 {
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card-content .type-label {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .card-content p.desc {
      font-size: 0.95rem;
      color: #555;
    }
    .card-content .award {
      font-size: 0.8rem;
      color: #fff;
      margin-top: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      background: linear-gradient(135deg, #d4af37, #b8941f);
      padding: 0.4rem 0.8rem;
      border-radius: 50px;
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      transition: transform var(--transition), box-shadow var(--transition);
      display: inline-block;
    }
    .card-content .award:hover {
      transform: none;
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
    }
    .card-actions {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      gap: 0.5rem;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
      z-index: 4; /* Keep buttons clickable and on top */
    }
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }
    .btn:hover {
      background: var(--primary-dark);
    }
    a { text-decoration: none; }
    
    .version-number {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      z-index: 1000;
    }

    /* --- NATIVE VIEW TRANSITIONS --- */
    header {
      view-transition-name: main-header;
    }

    .profile-photo {
      view-transition-name: profile-photo;
    }

    #content {
      view-transition-name: page-content;
    }

    ::view-transition-old(page-content) {
      animation: fade-out 0.2s cubic-bezier(0.4, 0, 1, 1) both;
    }

    ::view-transition-new(page-content) {
      animation: slide-up 0.4s cubic-bezier(0, 0, 0.2, 1) both;
    }

    @keyframes fade-out {
      to { opacity: 0; transform: translateY(-10px); }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }


    </style>
</head>
<body>
  <div class="version-number" id="version">v1.3</div>
  
  <header>
    <h1 id="site-title">
      <img src="goated photo.png" alt="Malachy Fernandez" class="profile-photo">
      <span>Malachy Fernandez</span>
    </h1>
    <div class="nav" id="navigation">
      </div>
  </header>

  <div class="container" id="content">
    <!-- Content will be populated by JavaScript -->
  </div>

  <script src="config/site.js"></script>
  <script src="config/projects.js"></script>
  <script>
    // Apply configuration to the page
    function initializeSite() {
      // Set CSS variables from site config
      const root = document.documentElement;
      root.style.setProperty('--primary-color', siteConfig.colors.primary);
      root.style.setProperty('--primary-dark-color', siteConfig.colors.primaryDark);
      root.style.setProperty('--accent-light-color', siteConfig.colors.accentLight);
      root.style.setProperty('--text-color', siteConfig.colors.text);
      root.style.setProperty('--bg-start-color', siteConfig.colors.bgStart);
      root.style.setProperty('--bg-end-color', siteConfig.colors.bgEnd);
      root.style.setProperty('--card-color', siteConfig.colors.card);
      root.style.setProperty('--award-color', siteConfig.colors.awardColor);
      root.style.setProperty('--header-start', siteConfig.headerGradient.start);
      root.style.setProperty('--header-end', siteConfig.headerGradient.end);
      root.style.setProperty('--font-family', siteConfig.site.font);

      // Set page title and site title
      document.getElementById('page-title').textContent = siteConfig.site.title;

      // Build navigation
      const navContainer = document.getElementById('navigation');
      siteConfig.navigation.forEach((item, index) => {
        if (index > 0) {
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.textContent = '·';
          navContainer.appendChild(dot);
        }

        const element = document.createElement(item.link ? 'a' : 'span');
        if (item.active) element.className = 'active';
        if (item.link) {
          element.href = item.link;
        }
        element.textContent = item.text;
        navContainer.appendChild(element);
      });

      // Build project sections from project config
      const contentContainer = document.getElementById('content');
      projectShowcaseConfig.sections.forEach(section => {
        const sectionElement = document.createElement('section');
        sectionElement.className = 'projects-section';

        // Section title
        const titleElement = document.createElement('h2');
        titleElement.textContent = section.title;
        sectionElement.appendChild(titleElement);

        // Section subtext
        const subtextElement = document.createElement('p');
        subtextElement.className = 'section-subtext';
        subtextElement.textContent = section.subtext;
        sectionElement.appendChild(subtextElement);

        // Projects grid
        const projectsGrid = document.createElement('div');
        projectsGrid.className = 'projects';

        section.projects.forEach(project => {
          const card = document.createElement('div');
          card.className = 'project-card';

          // Apply background image if specified
          if (project.backgroundImage) {
            card.classList.add('has-background-image');
            
            const bgDiv = document.createElement('div');
            bgDiv.className = 'card-bg';
            bgDiv.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('${project.backgroundImage}')`;
            card.appendChild(bgDiv);
          }

          // Card content
          const cardContent = document.createElement('div');
          cardContent.className = 'card-content';

          // Icon
          const icon = document.createElement('i');
          icon.className = project.icon;
          cardContent.appendChild(icon);

          // Project name
          const name = document.createElement('h3');
          name.textContent = project.name;
          cardContent.appendChild(name);

          // Type label
          const typeLabel = document.createElement('div');
          typeLabel.className = 'type-label';
          typeLabel.textContent = project.type;
          cardContent.appendChild(typeLabel);

          // Description
          const desc = document.createElement('p');
          desc.className = 'desc';
          desc.textContent = project.description;
          cardContent.appendChild(desc);

          // Award (if exists)
          if (project.award) {
            const award = document.createElement('div');
            award.className = 'award';
            award.textContent = project.award;
            cardContent.appendChild(award);
          }

          card.appendChild(cardContent);

          // Card actions
          const cardActions = document.createElement('div');
          cardActions.className = 'card-actions';

          project.buttons.forEach(button => {
            const link = document.createElement('a');
            link.href = button.link;
            link.target = button.target || '_blank';
            
            const btn = document.createElement('button');
            btn.className = 'btn';
            
            const icon = document.createElement('i');
            icon.className = button.icon;
            btn.appendChild(icon);
            
            btn.appendChild(document.createTextNode(' ' + button.text));
            link.appendChild(btn);
            cardActions.appendChild(link);
          });

          card.appendChild(cardActions);
          projectsGrid.appendChild(card);
          
          // Add click listener for mobile toggle
          card.addEventListener('click', function(e) {
            // Don't toggle if clicking on a button link
            if (e.target.closest('a')) return;
            this.classList.toggle('touch-active');
            document.querySelectorAll('.project-card').forEach(c => {
              if (c !== this) c.classList.remove('touch-active');
            });
          });
        });

        sectionElement.appendChild(projectsGrid);
        contentContainer.appendChild(sectionElement);
      });
    }

    // Initialize the site immediately so View Transition can see it
    initializeSite();
  </script>
</body>
</html>
