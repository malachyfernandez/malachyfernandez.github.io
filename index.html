<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Loading...</title>
  <!-- Google Fonts -->
  <link id="google-fonts" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --primary: var(--primary-color);
      --primary-dark: var(--primary-dark-color);
      --accent-light: var(--accent-light-color);
      --text: var(--text-color);
      --bg-start: var(--bg-start-color);
      --bg-end: var(--bg-end-color);
      --card: var(--card-color);
      --radius: 12px;
      --transition: 0.3s ease;
      --award-color: var(--award-color);
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: var(--font-family), sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 3rem 1rem;
      background: linear-gradient(120deg, var(--header-start), var(--header-end));
      color: #fff;
    }
    header h1 {
      font-size: 2.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      white-space: normal;
      overflow-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    header .nav {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    header .nav a,
    header .nav span {
      margin: 0 0.5rem;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-weight: 600;
    }
    header .nav .active {
      color: #fff;
    }
    header .nav .dot {
      color: rgba(255,255,255,0.5);
      cursor: default;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 2rem 1rem;
    }
    .projects-section {
      margin-bottom: 3rem;
    }
    .projects-section h2 {
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin-bottom: 0.25rem;
      font-weight: 600;
    }
    .projects-section .section-subtext {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
    }
    .projects {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      justify-content: center;
    }
    .project-card {
      position: relative;
      background: var(--card);
      padding: 2rem 1.5rem;
      border-radius: var(--radius);
      border-left: 5px solid var(--primary);
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      background: var(--accent-light);
      border-radius: 50%;
      transition: top var(--transition), right var(--transition);
    }
    .project-card:hover {
      transform: translateY(-6px) rotate(1deg) scale(1.02);
      box-shadow: 0 12px 20px rgba(0,0,0,0.15);
    }
    .project-card:hover::before {
      top: -20px; right: -20px;
    }
    .card-content {
      text-align: center;
      transition: opacity var(--transition);
    }
    .project-card:hover .card-content {
      opacity: 0.2;
    }
    .card-content i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--primary);
      transition: color var(--transition);
    }
    .project-card:hover .card-content i {
      color: #fff;
    }
    .card-content h3 {
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card-content .type-label {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .card-content p.desc {
      font-size: 0.95rem;
      color: #555;
    }
    .card-content .award {
      font-size: 0.8rem;
      color: var(--award-color);
      margin-top: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .card-actions {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      gap: 0.5rem;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .project-card:hover .card-actions,
    .project-card.touch-active .card-actions {
      opacity: 1;
      pointer-events: auto;
    }
    .project-card.touch-active .card-content {
      opacity: 0.2;
    }
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }
    .btn:hover {
      background: var(--primary-dark);
    }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1 id="site-title">Loading...</h1>
    <div class="nav" id="navigation">
      <!-- Navigation will be populated by JavaScript -->
    </div>
  </header>

  <div class="container" id="content">
    <!-- Content will be populated by JavaScript -->
  </div>

  <!-- Debug log for mobile testing -->
  <div id="debug-log" style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: white; font-family: monospace; font-size: 10px; padding: 5px; max-height: 150px; overflow-y: auto; z-index: 9999;"></div>

  <script src="config/site.js"></script>
  <script src="config/projects.js"></script>
  <script>
    // Debug logging function
    function debugLog(message) {
      const debugElement = document.getElementById('debug-log');
      if (debugElement) {
        const timestamp = new Date().toLocaleTimeString();
        debugElement.innerHTML += `[${timestamp}] ${message}<br>`;
        debugElement.scrollTop = debugElement.scrollHeight;
      }
      console.log(message);
    }

    // Touch detection and interaction handling
    let isTouchDevice = false;
    let activeCard = null;
    let touchStartTime = 0;
    let touchStartY = 0;
    let isScrolling = false;
    let scrollTimeout = null;
    let touchMoved = false;

    // Detect touch device
    function detectTouchDevice() {
      isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || navigator.msMaxTouchPoints > 0;
      debugLog(`Touch device detected: ${isTouchDevice}`);
      
      if (isTouchDevice) {
        document.body.classList.add('touch-device');
        debugLog('Added touch-device class to body');
      }
    }

    // Handle touch interactions
    function handleTouchStart(e) {
      debugLog(`=== TOUCH START ===`);
      debugLog(`isTouchDevice: ${isTouchDevice}`);
      
      if (!isTouchDevice) return;
      
      const card = e.target.closest('.project-card');
      debugLog(`Card found: ${!!card}`);
      if (!card) return;
      
      // Reset scroll detection variables
      touchStartTime = Date.now();
      touchStartY = e.touches[0].clientY;
      isScrolling = false;
      touchMoved = false;
      
      debugLog(`Touch start time: ${touchStartTime}, Y: ${touchStartY}`);
      
      // Clear any existing scroll timeout
      if (scrollTimeout) {
        clearTimeout(scrollTimeout);
        scrollTimeout = null;
        debugLog('Cleared existing scroll timeout');
      }
      
      // If clicking on a button, let it work normally
      if (e.target.closest('.btn')) {
        debugLog('Touch on button - ignoring');
        return;
      }
      
      // Store which card is being touched for later processing
      activeCard = card;
      debugLog(`Set activeCard: ${card.querySelector('h3')?.textContent}`);
    }
    
    // Handle touch move to detect scrolling
    function handleTouchMove(e) {
      if (!isTouchDevice || !activeCard) return;
      
      const touchY = e.touches[0].clientY;
      const deltaY = Math.abs(touchY - touchStartY);
      
      debugLog(`Touch move - deltaY: ${deltaY}`);
      
      // If moved more than 10px, consider it scrolling
      if (deltaY > 10) {
        isScrolling = true;
        touchMoved = true;
        debugLog('Detected scrolling - showing card for feedback');
        // Show the card during scrolling for visual feedback
        activeCard.classList.add('touch-active');
      }
    }
    
    // Handle touch end to determine if it was a tap or scroll
    function handleTouchEnd(e) {
      debugLog(`=== TOUCH END ===`);
      if (!isTouchDevice || !activeCard) return;
      
      const touchDuration = Date.now() - touchStartTime;
      const cardName = activeCard.querySelector('h3')?.textContent;
      const wasActive = activeCard.classList.contains('touch-active');
      
      debugLog(`Touch duration: ${touchDuration}ms, touchMoved: ${touchMoved}, wasActive: ${wasActive}`);
      
      // If it was a quick tap (less than 200ms) and didn't move much, treat as toggle
      if (touchDuration < 200 && !touchMoved) {
        debugLog(`QUICK TAP - toggling card "${cardName}"`);
        // This was a tap, so toggle the card
        if (wasActive) {
          activeCard.classList.remove('touch-active');
          debugLog(`REMOVED touch-active from "${cardName}"`);
          // Don't set activeCard to null immediately - let the click handler deal with it
        } else {
          // Remove active class from any other card first
          document.querySelectorAll('.project-card.touch-active').forEach(c => {
            const otherName = c.querySelector('h3')?.textContent;
            if (c !== activeCard) {
              c.classList.remove('touch-active');
              debugLog(`REMOVED touch-active from other card "${otherName}"`);
            }
          });
          activeCard.classList.add('touch-active');
          debugLog(`ADDED touch-active to "${cardName}"`);
        }
      } else if (isScrolling) {
        debugLog(`SCROLLING detected - setting timeout to close "${cardName}"`);
        // This was scrolling, set a timeout to close the card after scrolling stops
        if (scrollTimeout) {
          clearTimeout(scrollTimeout);
        }
        
        scrollTimeout = setTimeout(() => {
          if (activeCard) {
            const timeoutCardName = activeCard.querySelector('h3')?.textContent;
            activeCard.classList.remove('touch-active');
            debugLog(`TIMEOUT: REMOVED touch-active from "${timeoutCardName}"`);
            activeCard = null;
          }
          scrollTimeout = null;
        }, 500); // Close after 500ms of no scrolling
      } else {
        debugLog(`NOT TAP OR SCROLL - closing "${cardName}"`);
        // Not a tap and not scrolling - close the card
        if (activeCard) {
          activeCard.classList.remove('touch-active');
          debugLog(`REMOVED touch-active from "${cardName}"`);
          activeCard = null;
        }
      }
    }

    // Handle clicks outside cards to close active card
    function handleDocumentClick(e) {
      debugLog(`=== DOCUMENT CLICK ===`);
      if (!isTouchDevice || !activeCard) {
        debugLog(`Early return - isTouchDevice: ${isTouchDevice}, activeCard: ${!!activeCard}`);
        return;
      }
      
      const card = e.target.closest('.project-card');
      const button = e.target.closest('.btn');
      const activeCardName = activeCard.querySelector('h3')?.textContent;
      const clickedCardName = card?.querySelector('h3')?.textContent;
      
      debugLog(`Click target - card: "${clickedCardName}", button: ${!!button}, activeCard: "${activeCardName}"`);
      
      // Don't close if clicking on a button inside the active card
      if (card === activeCard && button) {
        debugLog('Click on button inside active card - NOT closing');
        return;
      }
      
      // Close if clicking outside cards, on a different card, or on the same card (but not a button)
      if (!card || card !== activeCard || (card === activeCard && !button)) {
        debugLog(`CLOSING active card "${activeCardName}" - condition met`);
        activeCard.classList.remove('touch-active');
        activeCard = null;
      } else {
        debugLog(`NOT closing - condition not met`);
      }
    }

    // Apply configuration to the page
    function initializeSite() {
      // Detect touch device first
      detectTouchDevice();

      // Set CSS variables from site config
      const root = document.documentElement;
      root.style.setProperty('--primary-color', siteConfig.colors.primary);
      root.style.setProperty('--primary-dark-color', siteConfig.colors.primaryDark);
      root.style.setProperty('--accent-light-color', siteConfig.colors.accentLight);
      root.style.setProperty('--text-color', siteConfig.colors.text);
      root.style.setProperty('--bg-start-color', siteConfig.colors.bgStart);
      root.style.setProperty('--bg-end-color', siteConfig.colors.bgEnd);
      root.style.setProperty('--card-color', siteConfig.colors.card);
      root.style.setProperty('--award-color', siteConfig.colors.awardColor);
      root.style.setProperty('--header-start', siteConfig.headerGradient.start);
      root.style.setProperty('--header-end', siteConfig.headerGradient.end);
      root.style.setProperty('--font-family', siteConfig.site.font);

      // Set page title and site title
      document.getElementById('page-title').textContent = siteConfig.site.title;
      
      // Create header content with photo
      const siteTitleElement = document.getElementById('site-title');
      siteTitleElement.innerHTML = '';
      
      // Add photo
      const photo = document.createElement('img');
      photo.src = 'goated photo.png';
      photo.alt = 'Malachy Fernandez';
      photo.className = 'profile-photo';
      siteTitleElement.appendChild(photo);
      
      // Add name
      const nameSpan = document.createElement('span');
      nameSpan.textContent = siteConfig.site.author;
      siteTitleElement.appendChild(nameSpan);

      // Set Google Fonts
      document.getElementById('google-fonts').href = 
        `https://fonts.googleapis.com/css2?family=${siteConfig.site.font}:wght@400;600&display=swap`;

      // Build navigation
      const navContainer = document.getElementById('navigation');
      siteConfig.navigation.forEach((item, index) => {
        if (index > 0) {
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.textContent = '·';
          navContainer.appendChild(dot);
        }

        const element = document.createElement(item.link ? 'a' : 'span');
        if (item.active) element.className = 'active';
        if (item.link) {
          element.href = item.link;
          // Don't set target for internal navigation
        }
        element.textContent = item.text;
        navContainer.appendChild(element);
      });

      // Build project sections from project config
      const contentContainer = document.getElementById('content');
      projectShowcaseConfig.sections.forEach(section => {
        const sectionElement = document.createElement('section');
        sectionElement.className = 'projects-section';

        // Section title
        const titleElement = document.createElement('h2');
        titleElement.textContent = section.title;
        sectionElement.appendChild(titleElement);

        // Section subtext
        const subtextElement = document.createElement('p');
        subtextElement.className = 'section-subtext';
        subtextElement.textContent = section.subtext;
        sectionElement.appendChild(subtextElement);

        // Projects grid
        const projectsGrid = document.createElement('div');
        projectsGrid.className = 'projects';

        section.projects.forEach(project => {
          const card = document.createElement('div');
          card.className = 'project-card';

          // Card content
          const cardContent = document.createElement('div');
          cardContent.className = 'card-content';

          // Icon
          const icon = document.createElement('i');
          icon.className = project.icon;
          cardContent.appendChild(icon);

          // Project name
          const name = document.createElement('h3');
          name.textContent = project.name;
          cardContent.appendChild(name);

          // Type label
          const typeLabel = document.createElement('div');
          typeLabel.className = 'type-label';
          typeLabel.textContent = project.type;
          cardContent.appendChild(typeLabel);

          // Description
          const desc = document.createElement('p');
          desc.className = 'desc';
          desc.textContent = project.description;
          cardContent.appendChild(desc);

          // Award (if exists)
          if (project.award) {
            const award = document.createElement('div');
            award.className = 'award';
            award.textContent = project.award;
            cardContent.appendChild(award);
          }

          card.appendChild(cardContent);

          // Card actions
          const cardActions = document.createElement('div');
          cardActions.className = 'card-actions';

          project.buttons.forEach(button => {
            const link = document.createElement('a');
            link.href = button.link;
            link.target = button.target || '_blank';
            
            const btn = document.createElement('button');
            btn.className = 'btn';
            
            const icon = document.createElement('i');
            icon.className = button.icon;
            btn.appendChild(icon);
            
            btn.appendChild(document.createTextNode(' ' + button.text));
            link.appendChild(btn);
            cardActions.appendChild(link);
          });

          card.appendChild(cardActions);
          projectsGrid.appendChild(card);
        });

        sectionElement.appendChild(projectsGrid);
        contentContainer.appendChild(sectionElement);
      });

      // Add touch event listeners if touch device
      if (isTouchDevice) {
        document.addEventListener('touchstart', handleTouchStart, { passive: true });
        document.addEventListener('touchmove', handleTouchMove, { passive: true });
        document.addEventListener('touchend', handleTouchEnd, { passive: true });
        document.addEventListener('click', handleDocumentClick);
      }
    }

    // Initialize the site when DOM is loaded
    document.addEventListener('DOMContentLoaded', initializeSite);
  </script>
</body>
</html>
